<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DA 학급 운영 시스템</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap');
  :root{
    --primary:#1a56db;--pl:#e8f0fe;--suc:#0e9f6e;--sl:#def7ec;
    --dan:#e02424;--dl:#fde8e8;--warn:#c27803;--wl:#fdf6b2;
    --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g800:#1f2937;--g900:#111827;
    --success-light:#def7ec;--danger-light:#fde8e8;
    --r:12px;--sh:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
    --bg:#f0f4f8;--card:white;--card-border:var(--g200);
  }
  [data-theme="dark"]{
    --primary:#60a5fa;--pl:#1e3a5f;--suc:#34d399;--sl:#064e3b;
    --dan:#f87171;--dl:#450a0a;--warn:#fbbf24;--wl:#422006;
    --g50:#1a1a2e;--g100:#1f2937;--g200:#374151;--g300:#4b5563;--g400:#6b7280;--g500:#9ca3af;--g600:#d1d5db;--g700:#e5e7eb;--g800:#f3f4f6;--g900:#f9fafb;
    --success-light:#064e3b;--danger-light:#450a0a;
    --sh:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
    --bg:#0f172a;--card:#1e293b;--card-border:#334155;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--g900);min-height:100vh;font-size:15px;transition:background .3s,color .3s;}
  #loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
  .lcard{background:var(--card);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:440px;box-shadow:0 4px 6px rgba(0,0,0,.07);}
  .llogo{text-align:center;margin-bottom:2rem;}
  .llogo h1{font-family:'Space Grotesk',sans-serif;font-size:2rem;color:var(--primary);}
  .llogo p{color:var(--g500);font-size:.9rem;margin-top:.2rem;}
  .fg{margin-bottom:.9rem;}
  .fg label{display:block;font-size:.85rem;font-weight:500;color:var(--g700);margin-bottom:.35rem;}
  .fg select,.fg input{width:100%;padding:.65rem .9rem;border:1.5px solid var(--g200);border-radius:10px;font-size:1rem;font-family:inherit;outline:none;transition:border-color .2s;background:var(--card);color:var(--g900);}
  .fg select:focus,.fg input:focus{border-color:var(--primary);}
  /* 학생 이름 선택 그리드 */
  .student-grid-sel{display:grid;grid-template-columns:repeat(4,1fr);gap:.35rem;margin-bottom:.9rem;}
  .stu-btn{padding:.6rem .3rem;border:1.5px solid var(--g200);border-radius:10px;background:var(--g50);font-size:.88rem;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit;color:var(--g700);line-height:1.5;}
  .stu-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--pl);}
  .stu-btn.selected{border-color:var(--primary);background:var(--primary);color:white;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:.62rem 1rem;border-radius:10px;border:none;font-size:.92rem;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;}
  .bp{background:var(--primary);color:white;}.bp:hover{opacity:.9;}
  .bs{background:var(--g100);color:var(--g700);}.bs:hover{background:var(--g200);}
  .bsuc{background:var(--suc);color:white;}.bsuc:hover{opacity:.9;}
  .bdan{background:var(--dan);color:white;}.bdan:hover{opacity:.9;}
  .bsm{padding:.35rem .75rem;font-size:.82rem;}
  .bfull{width:100%;}
  #appScreen{display:none;min-height:100vh;flex-direction:column;}
  .topbar{background:var(--card);border-bottom:1px solid var(--card-border);padding:0 1.4rem;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .tlogo{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:700;color:var(--primary);}
  /* 상단 탭 - 데스크탑 */
  .nav-tabs{display:none;background:var(--card);border-bottom:1px solid var(--card-border);padding:0 .8rem;overflow-x:auto;scrollbar-width:none;}
  .nav-tabs::-webkit-scrollbar{display:none;}
  .nt{padding:.7rem 1rem;font-size:.85rem;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;}
  .nt.active{color:var(--primary);border-bottom-color:var(--primary);}
  .nt:hover:not(.active){color:var(--g700);}
  /* 하단 탭 바 */
  .bottom-tabs{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--card-border);z-index:100;padding:0;padding-bottom:env(safe-area-inset-bottom,0);}
  .bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.45rem 0 .35rem;font-size:.62rem;font-weight:500;color:var(--g400);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;border:none;background:none;gap:.12rem;position:relative;}
  .bt.active{color:var(--primary);}
  .bt.active::before{content:'';position:absolute;top:0;left:25%;right:25%;height:2.5px;background:var(--primary);border-radius:0 0 4px 4px;}
  .bt-icon{font-size:1.15rem;line-height:1;}
  .bt-label{line-height:1;}
  .mc{padding:1.1rem;padding-bottom:5rem;max-width:860px;margin:0 auto;width:100%;}
  .tc{display:none;}.tc.active{display:block;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  @keyframes treeShake{0%,100%{transform:rotate(0);}15%{transform:rotate(-6deg);}30%{transform:rotate(5deg);}45%{transform:rotate(-4deg);}60%{transform:rotate(3deg);}75%{transform:rotate(-1deg);}}
  .tree-shake{animation:treeShake .8s ease;}
  .card{background:var(--card);border-radius:var(--r);padding:1.2rem;box-shadow:var(--sh);margin-bottom:.9rem;}
  .ct{font-size:.97rem;font-weight:700;color:var(--g900);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
  .sg{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:.9rem;}
  .si{background:var(--g50);border-radius:10px;padding:.85rem;text-align:center;}
  .sl{font-size:.75rem;color:var(--g500);margin-bottom:.2rem;}
  .sv{font-size:1.05rem;font-weight:700;}
  /* PnL Banner */
  .pb{border-radius:12px;padding:.9rem 1rem;margin-bottom:.9rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;}
  .pb.pos{background:var(--sl);border:1.5px solid var(--suc);}
  .pb.neg{background:var(--dl);border:1.5px solid var(--dan);}
  .pb.neu{background:var(--g50);border:1.5px solid var(--g200);}
  .pb-label{font-size:.82rem;color:var(--g700);margin-bottom:.12rem;}
  .pb-amt{font-size:1.3rem;font-weight:700;}
  .pb-pct{font-size:.83rem;font-weight:600;margin-top:.08rem;}
  /* Stock card */
  .sc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.65rem;}
  .sch{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;}
  .scn{font-weight:700;font-size:.97rem;}
  .scp{text-align:right;}
  .scpv{font-size:1.1rem;font-weight:700;}
  .bdg{display:inline-block;padding:.16rem .55rem;border-radius:6px;font-size:.74rem;font-weight:500;}
  .bsemi{background:#dbeafe;color:var(--primary);}.bfood{background:#dcfce7;color:var(--suc);}.bent{background:#fce7f3;color:var(--dan);}
  .pnl-row{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.5rem;}
  .pnl-cell{border-radius:8px;padding:.48rem .7rem;}
  .pnl-cell-neu{background:var(--g50);}
  .pnl-cell-pos{background:var(--sl);}
  .pnl-cell-neg{background:var(--dl);}
  /* News */
  .ni{padding:.7rem;border-left:3px solid var(--primary);background:var(--pl);border-radius:0 8px 8px 0;margin-bottom:.5rem;}
  .ni-title{font-size:.9rem;font-weight:500;}
  .ni-meta{font-size:.75rem;color:var(--g500);margin-top:.14rem;}
  /* Trade */
  .tr-row{display:flex;gap:.45rem;align-items:flex-end;flex-wrap:wrap;margin-top:.6rem;}
  .tr-row .fg{flex:1;min-width:100px;margin-bottom:0;}
  /* Rank */
  .ri{display:flex;align-items:center;gap:.85rem;padding:.7rem;border-radius:10px;margin-bottom:.45rem;background:var(--g50);}
  .rn{font-size:1rem;font-weight:700;min-width:26px;text-align:center;}
  .rn.gold{color:#d97706;}.rn.silver{color:var(--g500);}.rn.bronze{color:var(--warn);}
  .ri-info{flex:1;}
  .ri-name{font-weight:600;font-size:.9rem;}
  .ri-sub{font-size:.76rem;color:var(--g500);}
  .ri-ret{font-size:.92rem;font-weight:700;margin-left:auto;}
  /* Deposit */
  .dc{border:1.5px solid var(--g200);border-radius:var(--r);padding:.9rem;margin-bottom:.55rem;}
  .dch{display:flex;justify-content:space-between;align-items:flex-start;}
  .dct{font-weight:600;font-size:.9rem;}
  .dcr{font-size:.8rem;color:var(--suc);font-weight:500;}
  .dcd{font-size:.73rem;color:var(--g500);margin-top:.13rem;}
  /* Company */
  .co{border:1.5px solid var(--g200);border-radius:var(--r);padding:1rem;margin-bottom:.65rem;}
  .co-hd{display:flex;align-items:center;gap:.7rem;margin-bottom:.65rem;}
  .co-ic{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
  .co-nm{font-weight:700;font-size:.97rem;}
  .co-desc{font-size:.86rem;color:var(--g700);line-height:1.8;margin-bottom:.65rem;}
  .co-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;}
  .co-st{background:var(--g50);border-radius:8px;padding:.55rem .7rem;text-align:center;}
  .co-stl{font-size:.7rem;color:var(--g500);margin-bottom:.12rem;}
  .co-stv{font-size:.9rem;font-weight:700;}
  /* Cashier / Teacher */
  .cr{border:1px solid var(--g200);border-radius:10px;padding:.75rem .9rem;margin-bottom:.45rem;display:flex;justify-content:space-between;align-items:center;font-size:.86rem;}
  .ci{flex:1;}.cn{font-weight:600;}.cd{color:var(--g500);font-size:.76rem;}
  .ca{display:flex;gap:.32rem;}
  .tst{font-size:.85rem;font-weight:600;color:var(--g700);margin-bottom:.65rem;padding-bottom:.35rem;border-bottom:1px solid var(--g200);}
  .stg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.45rem;}
  .sti{background:var(--g50);border-radius:8px;padding:.65rem .85rem;font-size:.83rem;}
  /* Modal */
  .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;align-items:center;justify-content:center;padding:1rem;}
  .mo.open{display:flex;}
  .mi{background:var(--card);border-radius:16px;padding:1.4rem;width:100%;max-width:380px;max-height:90vh;overflow-y:auto;}
  .mi-t{font-size:.97rem;font-weight:700;margin-bottom:.9rem;}
  .mi-a{display:flex;gap:.45rem;margin-top:.9rem;}
  /* Toast */
  #toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);background:var(--g900);color:var(--g50);padding:.56rem 1.1rem;border-radius:20px;font-size:.86rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
  #toast.show{opacity:1;}
  /* Version badge */
  .ver{position:fixed;bottom:.6rem;right:.8rem;font-size:.7rem;color:var(--g500);background:rgba(255,255,255,.8);padding:.15rem .5rem;border-radius:20px;z-index:50;}
  [data-theme="dark"] .ver{background:rgba(0,0,0,.5);}
  /* Utils */
  .mt1{margin-top:.5rem;}.mt2{margin-top:1rem;}
  .flex{display:flex;}.gap2{gap:.5rem;}.jb{justify-content:space-between;}.ac{align-items:center;}
  .tsm{font-size:.84rem;}.txs{font-size:.75rem;}.fb{font-weight:700;}.tr{text-align:right;}
  .tg{color:var(--g500);}.tp{color:var(--primary);}.tsuc{color:var(--suc);}.tdan{color:var(--dan);}
  .div{border:none;border-top:1px solid var(--g200);margin:.9rem 0;}
  .empty{text-align:center;color:var(--g500);font-size:.85rem;padding:1.5rem;}
  .pbg{background:var(--wl);color:var(--warn);border-radius:999px;padding:.1rem .5rem;font-size:.72rem;font-weight:600;}
  input[type=number]{-moz-appearance:textfield;}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  /* 데스크탑: 상단 탭 표시, 하단 탭 숨김 */
  [data-theme="dark"] .bsemi{background:#1e3a5f;color:#93c5fd;}
  [data-theme="dark"] .bfood{background:#064e3b;color:#6ee7b7;}
  [data-theme="dark"] .bent{background:#4a1942;color:#f9a8d4;}
  [data-theme="dark"] .pb.pos{border-color:#065f46;}
  [data-theme="dark"] .pb.neg{border-color:#7f1d1d;}
  [data-theme="dark"] .rn.gold{color:#fbbf24;}
  [data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--card);color:var(--g900);border-color:var(--g200);}
  [data-theme="dark"] input{background:var(--card);color:var(--g900);}
  [data-theme="dark"] .ni{background:var(--pl);border-left-color:var(--primary);}
  [data-theme="dark"] .dc{border-color:var(--g200);}
  [data-theme="dark"] .sc{border-color:var(--g200);}
  [data-theme="dark"] .co{border-color:var(--g200);}
  @media(min-width:769px){.nav-tabs{display:flex!important;}.bottom-tabs{display:none!important;}.mc{padding-bottom:1.1rem;}}
  @media(max-width:480px){.sg{grid-template-columns:1fr 1fr;}.mc{padding:.9rem .75rem;padding-bottom:5rem;}.topbar{padding:0 .85rem;}.student-grid-sel{grid-template-columns:repeat(3,1fr);}}

/* ── 신문고 (두루마리) */
.scroll-wrap{position:relative;margin:.5rem 0;cursor:pointer;}
.scroll-top,.scroll-bottom{background:linear-gradient(90deg,#92400e,#b45309,#92400e);border-radius:8px;height:18px;box-shadow:0 2px 6px rgba(0,0,0,.3);position:relative;z-index:2;}
.scroll-body{background:linear-gradient(180deg,#fef9c3,#fef3c7,#fef9c3);border:1px solid #fde68a;margin:-2px 6px;padding:1rem 1.25rem;position:relative;min-height:80px;box-shadow:inset 0 1px 3px rgba(0,0,0,.08);}
.scroll-body::before{content:'';position:absolute;left:0;top:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 22px,rgba(180,140,60,.12) 22px,rgba(180,140,60,.12) 23px);pointer-events:none;}
.scroll-new{background:linear-gradient(135deg,#fffbeb,#fef3c7);border:2px solid #f59e0b;border-radius:16px;padding:1.2rem;text-align:center;margin:.5rem 0;box-shadow:0 4px 16px rgba(245,158,11,.15);}
.scroll-stamp{display:inline-block;background:rgba(185,28,28,.08);border:2px solid rgba(185,28,28,.25);border-radius:50%;width:52px;height:52px;line-height:52px;font-size:1.6rem;margin-bottom:.4rem;}
.scroll-item{background:linear-gradient(180deg,#fef9c3,#fef3c7);border:1px solid #fde68a;border-radius:12px;padding:.75rem 1rem;margin-bottom:.55rem;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.07);}
.scroll-item.unread::before{content:'NEW';position:absolute;top:.4rem;right:.6rem;background:#ef4444;color:white;font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:999px;}
.scroll-item.replied::after{content:'답장完';position:absolute;top:.4rem;right:.6rem;background:#16a34a;color:white;font-size:.6rem;font-weight:700;padding:.1rem .4rem;border-radius:999px;}
@keyframes unroll{from{max-height:0;opacity:0}to{max-height:300px;opacity:1}}
.scroll-unroll{animation:unroll .5s cubic-bezier(.34,1.56,.64,1);}

/* ── 부동산 지도 (3×3 매력적 디자인) */
.re-map-wrap{overflow:visible;border:none;border-radius:0;background:transparent;padding:0;margin-bottom:1rem;}
.re-map-3x3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:.5rem;}
.re-cell{border-radius:18px;border:2.5px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);user-select:none;position:relative;aspect-ratio:1;min-height:108px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:.5rem .25rem;}
.re-cell.empty{background:linear-gradient(145deg,#f0f9ff,#e0f2fe);border-color:#bae6fd;}
.re-cell.empty:hover{background:linear-gradient(145deg,#dbeafe,#bfdbfe);border-color:#3b82f6;transform:scale(1.05);box-shadow:0 6px 20px rgba(59,130,246,.25);}
.re-cell.owned-me{background:linear-gradient(145deg,#d1fae5,#a7f3d0);border-color:#34d399;box-shadow:0 4px 14px rgba(52,211,153,.2);}
.re-cell.owned-other{background:linear-gradient(145deg,#f3f4f6,#e5e7eb);border-color:#9ca3af;cursor:pointer;}
.re-cell.owned-other:hover{transform:scale(1.03);box-shadow:0 4px 12px rgba(0,0,0,.12);}
.re-cell.selecting{background:linear-gradient(145deg,#ede9fe,#ddd6fe);border-color:#7c3aed;transform:scale(1.06);box-shadow:0 6px 20px rgba(124,58,237,.3);}
.re-cell .cell-label{font-size:1rem;font-weight:900;margin-top:.25rem;line-height:1.1;letter-spacing:-.01em;}
.re-cell .cell-owner{font-size:.68rem;color:var(--g500);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 .2rem;margin-top:.1rem;}
.re-cell-emoji{font-size:2.8rem;line-height:1;display:block;}
.re-legend{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem;}
.re-leg-item{display:flex;align-items:center;gap:.3rem;font-size:.72rem;color:var(--g600);}
.re-leg-dot{width:14px;height:14px;border-radius:4px;flex-shrink:0;}
.re-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:.85rem;}
.re-kpi{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:.7rem .85rem;}
.re-kpi-label{font-size:.7rem;color:var(--g500);margin-bottom:.18rem;}
.re-kpi-val{font-size:1.05rem;font-weight:700;}
.re-plot-card{border:1.5px solid var(--g200);border-radius:12px;padding:.85rem;margin-bottom:.55rem;background:var(--card);}
.re-plot-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.55rem;}
.re-plot-title{font-weight:700;font-size:.9rem;}
.re-plot-badge{font-size:.7rem;font-weight:700;border-radius:999px;padding:.15rem .55rem;}
.re-building-grid{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.5rem;}
.re-build-btn{display:flex;flex-direction:column;align-items:center;padding:.45rem .6rem;border-radius:10px;border:1.5px solid var(--g200);background:var(--g50);cursor:pointer;font-size:.72rem;font-weight:600;gap:.15rem;transition:all .15s;}
.re-build-btn:hover{border-color:var(--primary);background:var(--pl);}
.re-build-btn.active{border-color:var(--suc);background:var(--sl);}
[data-theme="dark"] .re-cell.empty{background:linear-gradient(145deg,#1e3a5f,#1e40af);border-color:#3b82f6;}
[data-theme="dark"] .re-cell.owned-me{background:linear-gradient(145deg,#064e3b,#065f46);border-color:#34d399;}
[data-theme="dark"] .re-cell.owned-other{background:linear-gradient(145deg,#1f2937,#374151);border-color:#6b7280;}
:root{
  --gradA:linear-gradient(135deg,#1d4ed8 0%, #7c3aed 100%);
  --gradB:linear-gradient(135deg,#0f766e 0%, #1d4ed8 100%);
  --glass:rgba(255,255,255,.08);
}
[data-theme="dark"]{
  --glass:rgba(255,255,255,.06);
}
.hero-shell{background:var(--gradA);color:white;border-radius:18px;padding:1.15rem 1.1rem;box-shadow:0 14px 30px rgba(29,78,216,.18);margin-bottom:1rem;position:relative;overflow:hidden;}
.hero-shell::after{content:'';position:absolute;right:-28px;top:-24px;width:118px;height:118px;border-radius:999px;background:rgba(255,255,255,.10);filter:blur(2px);}
.hero-kicker{font-size:.74rem;letter-spacing:.04em;opacity:.84;margin-bottom:.18rem}
.hero-title{font-size:1.25rem;font-weight:700;line-height:1.2}
.hero-sub{font-size:.77rem;opacity:.8;margin-top:.2rem}
.hero-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.55rem;margin-top:.9rem}
.hero-stat{background:var(--glass);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(8px);border-radius:14px;padding:.7rem .75rem}
.hero-stat-label{font-size:.68rem;opacity:.76;margin-bottom:.18rem}
.hero-stat-value{font-size:1.02rem;font-weight:700}
.market-hero{background:var(--gradB)}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
.kpi-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:.95rem 1rem;box-shadow:var(--sh)}
.kpi-label{font-size:.72rem;color:var(--g500);margin-bottom:.2rem}
.kpi-value{font-size:1.08rem;font-weight:700}
.kpi-sub{font-size:.72rem;color:var(--g500);margin-top:.15rem}
.market-card{border:1px solid var(--card-border);border-radius:18px;background:var(--card);box-shadow:var(--sh);margin-bottom:1rem;overflow:hidden}
.market-card-head{display:flex;justify-content:space-between;align-items:flex-start;padding:1rem 1rem .6rem}
.market-name{font-size:1rem;font-weight:700}
.market-meta{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap;margin-top:.25rem}
.market-price{font-size:1.36rem;font-weight:700;letter-spacing:-.02em}
.market-delta{font-size:.82rem;font-weight:700;margin-top:.22rem}
.market-body{padding:0 1rem 1rem}
.metric-row{display:grid;grid-template-columns:repeat(4,1fr);gap:.45rem;margin-top:.7rem}
.metric-pill{background:var(--g50);border-radius:12px;padding:.58rem .65rem}
.metric-pill .l{font-size:.68rem;color:var(--g500);margin-bottom:.14rem}
.metric-pill .v{font-size:.85rem;font-weight:700}
.news-hero{background:var(--card);border:1px solid var(--card-border);border-radius:18px;box-shadow:var(--sh);padding:1rem;margin-bottom:1rem}
.news-grid{display:grid;grid-template-columns:1fr;gap:.55rem}
.news-card{border:1px solid var(--card-border);border-radius:14px;padding:.78rem .9rem;background:linear-gradient(180deg,var(--card),var(--g50));}
.news-card.breaking{border-color:rgba(29,78,216,.25);background:linear-gradient(180deg,var(--pl),var(--card));}
.news-head{display:flex;align-items:flex-start;gap:.7rem}
.news-chip{display:inline-flex;align-items:center;gap:.3rem;font-size:.67rem;font-weight:700;border-radius:999px;padding:.18rem .5rem}
.news-chip.pos{background:var(--sl);color:var(--suc)}
.news-chip.neg{background:var(--dl);color:var(--dan)}
.news-chip.neu{background:var(--g100);color:var(--g600)}
.news-chip.mega{background:#ede9fe;color:#6d28d9}
.news-chip.breaking{background:#dbeafe;color:#1d4ed8}
.news-title{font-size:.88rem;font-weight:700;line-height:1.45}
.news-desc{font-size:.75rem;color:var(--g500);line-height:1.5;margin-top:.18rem}
.market-pulse{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.8rem}
.pulse-chip{font-size:.71rem;font-weight:700;border-radius:999px;padding:.28rem .6rem;background:var(--g50);color:var(--g700);border:1px solid var(--card-border)}
.signal-good{color:var(--suc)}
.signal-bad{color:var(--dan)}
.signal-flat{color:var(--g500)}
.chart-wrap{border:1px solid var(--card-border);border-radius:16px;padding:.7rem;background:linear-gradient(180deg,var(--card),var(--g50))}
.chart-label-row{display:flex;justify-content:space-between;align-items:center;gap:.5rem;margin-bottom:.3rem}
.chart-label{font-size:.72rem;color:var(--g500);font-weight:600}
.chart-legend{font-size:.67rem;color:var(--g400)}
.section-title-row{display:flex;justify-content:space-between;align-items:flex-end;gap:.5rem;margin-bottom:.55rem}
.section-sub{font-size:.75rem;color:var(--g500)}
.rank-note{background:var(--pl);border:1px solid rgba(29,78,216,.18);border-radius:14px;padding:.75rem .9rem;margin-bottom:.85rem;font-size:.76rem;color:var(--g700)}
.lottery-preview{display:flex;gap:.35rem;flex-wrap:wrap;margin:.35rem 0 .2rem}
.lottery-pill{display:inline-flex;align-items:center;justify-content:center;min-width:2.2rem;height:2.2rem;border-radius:12px;background:var(--g50);border:1px solid var(--card-border);font-size:1.2rem}
.live-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.18rem .55rem;border-radius:999px;font-size:.68rem;font-weight:700;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.14);color:white}
.live-dot{width:.45rem;height:.45rem;border-radius:999px;background:#34d399;box-shadow:0 0 0 0 rgba(52,211,153,.65);animation:pulseLive 1.6s infinite}
@keyframes pulseLive{0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)}70%{box-shadow:0 0 0 .55rem rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}
@media(max-width:560px){
  .hero-grid,.kpi-grid,.metric-row{grid-template-columns:1fr 1fr}
  .hero-title{font-size:1.12rem}
  .market-price{font-size:1.2rem}
}

</style>

<script>
const STUDENTS=[
  {no:1,name:'강동률'},{no:2,name:'강지후'},{no:3,name:'김규리'},{no:4,name:'김라윤'},
  {no:5,name:'김주원'},{no:6,name:'김채린'},{no:7,name:'김채은'},{no:8,name:'김효현'},
  {no:9,name:'남예원'},{no:10,name:'박시우'},{no:11,name:'박재욱'},{no:12,name:'서유주'},
  {no:13,name:'신율'},{no:14,name:'신동하'},{no:15,name:'신지유'},{no:16,name:'이연재'},
  {no:17,name:'이예지'},{no:18,name:'임지호'},{no:19,name:'장서하'},{no:20,name:'정서연'},
  {no:21,name:'권재이'},{no:30,name:'테스트'}
];
const TEST_ACCOUNTS=['테스트']; // 테스트 계정 — 순위/순찰/과제에서 제외
// 실제 학생 목록 (테스트 계정 + 동적 추가/삭제 반영)
function realStudents(){
  const base=STUDENTS.filter(s=>!TEST_ACCOUNTS.includes(s.name));
  const extra=(state&&state.extraStudents)||[];
  const removed=(state&&state.removedStudents)||[];
  return [...base,...extra].filter(s=>!removed.includes(s.name));
}
// 입출금·잔액 조회용 — 테스트 계정 포함 (랭킹/순찰/과제에서는 realStudents 사용)
function allStudentsForCashier(){
  const extra=(state&&state.extraStudents)||[];
  const removed=(state&&state.removedStudents)||[];
  return [...STUDENTS,...extra].filter(s=>!removed.includes(s.name));
}
// 건물 기본 데이터 — 파일 상단에 정의해야 const 호이스팅 문제 없음
const RE_BUILDINGS={

  bldg: {name:'빌딩',     emoji:'🏢', cost:400,  income:15},

};

  {id:'food',name:'DA 식품',  sector:'식품',  badge:'bfood',emoji:'🍱',color:'#166534',bg:'#dcfce7'},

const CO_INFO={
  semi:{
    fullName:'DA 반도체 주식회사',
    desc:`DA 반도체는 스마트폰, 컴퓨터, 텔레비전 등 거의 모든 전자 제품 안에 들어가는 아주 작은 부품인 '반도체 칩'을 만드는 회사예요.\n\n쌀알보다도 훨씬 작은 이 칩 안에 수십억 개의 아주 작은 스위치가 들어 있어서, 기계가 계산하고 생각하고 기억할 수 있게 해 줘요. 마치 사람의 뇌 역할을 하는 거랍니다.\n\n최근에는 AI(인공지능)가 크게 유행하면서, AI가 학습하고 생각하는 데 필요한 특수 칩의 수요가 전 세계에서 폭발적으로 늘고 있어요. 전 세계 IT 회사들이 DA 반도체의 칩을 사기 위해 줄을 서고 있답니다!`,
    ceo:'김철수', employees:'4,800명', founded:'2001년'
  },
  food:{
    fullName:'DA 식품 주식회사',
    desc:`DA 식품은 라면, 냉동식품, 과자, 음료 등 맛있는 먹거리를 만드는 회사예요. 우리가 편의점이나 마트에서 자주 보는 식품들이 DA 식품에서 나온답니다.\n\n특히 한국 음식(K-푸드)이 전 세계적으로 인기를 끌면서, 동남아시아와 미국, 유럽에서도 DA 식품 제품을 즐겨 먹고 있어요. 라면 하나가 외국에서 선물로 인기 있을 정도예요!\n\n건강에 관심이 높아지면서 칼로리를 줄인 제품이나 채소로 만든 식품도 열심히 개발하고 있어요. 간편하면서도 건강하게 먹고 싶은 사람들에게 꼭 필요한 회사랍니다.`,
    ceo:'박민정', employees:'3,200명', founded:'1995년'
  },
  ent:{
    fullName:'DA 엔터테인먼트 주식회사',
    desc:`DA 엔터테인먼트는 가수, 배우, 유튜버 등 연예인을 발굴하고 키워내는 회사예요. 우리가 좋아하는 K팝 아이돌 그룹이 여기서 탄생하기도 해요!\n\n이 회사는 음악 제작, 콘서트 기획, 드라마·영화 제작까지 다양한 사업을 해요. K팝은 이제 전 세계 팬들이 열광하는 문화가 됐어요. 미국 빌보드 차트에 오르거나, 유럽·남미에서 콘서트를 열면 수만 명이 모여들어요.\n\n요즘은 음악 스트리밍, 팬덤 앱, 굿즈(가수 관련 상품) 판매로도 큰 수익을 올려요. 팬이 많아질수록 회사 가치도 높아지는 구조랍니다.`,
    ceo:'이지영', employees:'1,600명', founded:'2008년'

// ════════ LOCAL STORAGE SHIM (Firebase 교체용) ════════
// Firebase 연동 전 로컬 테스트용. 모든 데이터는 localStorage에 저장됩니다.
// 나중에 Firebase 연동 시 이 섹션을 교체하면 됩니다.
const ROOT = 'da_local';
const LS_KEY = 'da_state_v1';

// ── localStorage 읽기/쓰기 헬퍼 ──
function _lsGet(path){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return null;
    const obj=JSON.parse(raw);
    if(!path) return obj;
    const parts=path.split('/');
    let cur=obj;
    for(const p of parts){ if(cur==null||typeof cur!=='object') return null; cur=cur[p]; }
    return cur!==undefined?cur:null;
  }catch(e){ return null; }
}
function _lsSet(path, val){
  try{
    const raw=localStorage.getItem(LS_KEY);
    let obj=raw?JSON.parse(raw):{};
    if(!path){ localStorage.setItem(LS_KEY,JSON.stringify(val)); return; }
    const parts=path.split('/');
    let cur=obj;
    for(let i=0;i<parts.length-1;i++){
      if(cur[parts[i]]==null||typeof cur[parts[i]]!=='object') cur[parts[i]]={};
      cur=cur[parts[i]];
    }
    cur[parts[parts.length-1]]=val;
    localStorage.setItem(LS_KEY,JSON.stringify(obj));
  }catch(e){ console.warn('LS write error',e); }
}
function _lsMerge(basePath, updates){
  try{
    const raw=localStorage.getItem(LS_KEY);
    let root=raw?JSON.parse(raw):{};
    let base=root;
    if(basePath){
      for(const p of basePath.split('/')){
        if(base[p]==null||typeof base[p]!=='object') base[p]={};
        base=base[p];
      }
    }
    function deepSet(target, keyPath, v){
      const parts=keyPath.split('/');
      let cur=target;
      for(let i=0;i<parts.length-1;i++){
        if(cur[parts[i]]==null||typeof cur[parts[i]]!=='object') cur[parts[i]]={};
        cur=cur[parts[i]];
      }
      cur[parts[parts.length-1]]=v;
    }
    Object.entries(updates).forEach(([k,v])=>deepSet(base,k,v));
    localStorage.setItem(LS_KEY,JSON.stringify(root));
  }catch(e){ console.warn('LS merge error',e); }
}

function ref(_db, path){ return {_path: path||''}; }
function get(refObj){
  const val=_lsGet(refObj._path);
  return Promise.resolve({ exists:()=>val!==null, val:()=>val });
}
function set(refObj, val){
  _lsSet(refObj._path, val);
  return Promise.resolve();
}
function update(refObj, updates){
  _lsMerge(refObj._path, updates);
  return Promise.resolve();
}
function runTransaction(refObj, fn){
  const cur=_lsGet(refObj._path);
  const result=fn(cur);
  if(result!==undefined) _lsSet(refObj._path, result);
  const final=_lsGet(refObj._path);
  return Promise.resolve({
    committed:true,
    snapshot:{ exists:()=>final!==null, val:()=>final }
  });
}
// onValue: 로컬 모드에서는 초기 1회만 콜백 (실시간 동기화 없음)
function onValue(refObj, cb){
  const val=_lsGet(refObj._path);
  try{ cb({ exists:()=>val!==null, val:()=>val }); }catch(e){}
  return ()=>{}; // unsub noop
}

// Helpers
function kst(){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+9*3600000);}
function isWE(){const d=kst().getDay();return d===0||d===6;}
function fE2(n){return parseFloat(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')+' 조개';}
function fE(n){return Math.round(n).toLocaleString('ko-KR')+' 조개';}
function dStr(d){if(!d)d=kst();const dt=typeof d==='string'?new Date(d):d;return`${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;}
function daysLeft(dateStr){const now=kst();const t=new Date(dateStr);const diff=Math.ceil((t-now)/(1000*60*60*24));return Math.max(0,diff);}

// Firebase save (throttled)
let saveTimer=null;
const dirtyStudents=new Set();
function ss(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{ ssNow(); },1200); // 400ms→1200ms: 연속 변경 묶어서 1회만 저장
}
function markStudentDirty(name){
  if(name) dirtyStudents.add(name);
}
function markStudentsDirty(names){
  (names||[]).forEach(name=>{ if(name) dirtyStudents.add(name); });
}
function flushDirtyStudents(){
  if(!dirtyStudents.size) return Promise.resolve();
  const payload={};
  [...dirtyStudents].forEach(name=>{
    if(state?.students?.[name]){
      const d=JSON.parse(JSON.stringify(state.students[name]));
      // iconList 최신화 (iconMap → iconList)
      if(d.iconMap) d.iconList=Object.keys(d.iconMap).filter(e=>e&&e.trim());
      delete d.iconMap; // Firebase에는 iconMap 쓰지 않음
      payload[name]=d;
    }
  });
  dirtyStudents.clear();
  if(!Object.keys(payload).length) return Promise.resolve();
  return update(ref(db,ROOT+'/students'),payload);
}
function teacherSharedStatePayload(){
  const cloned=JSON.parse(JSON.stringify(state||{}));
  // ── 무거운 데이터는 제외 (각 함수에서 직접 경로로 저장) ──
  delete cloned.students;       // 학생: 별도 경로
  delete cloned.txLog;          // 거래내역: 별도 저장
  delete cloned.board;          // 게시판: set('/board') 로 저장
  delete cloned.homework;       // 과제: set('/homework') 로 저장
  delete cloned.patrolLog;      // 순찰: update('/patrolLog') 로 저장
  delete cloned.donationLog;    // 기부내역: update() 로 저장
  delete cloned.marketHistory;  // 시장히스토리: runMarket에서 저장
  // ── undefined 값 제거 (Firebase update 오류 방지) ──
  Object.keys(cloned).forEach(k=>{ if(cloned[k]===undefined) cloned[k]=null; });
  // ── 나머지 배열 크기 제한 ──
  if(cloned.news && cloned.news.length>20) cloned.news=cloned.news.slice(0,20);
  if(cloned.stocks){
    Object.keys(cloned.stocks).forEach(sid=>{
      const s=cloned.stocks[sid];
      if(s.history && s.history.length>31) s.history=s.history.slice(-31);
      if(s.dateHistory && s.dateHistory.length>31) s.dateHistory=s.dateHistory.slice(-31);
      if(s.intraday && s.intraday.length>10) s.intraday=s.intraday.slice(-10);
    });
  }
  return cloned;
}

// 30-day pre-sim
function sim30(){
  const h={semi:[20],food:[20],ent:[20]},news=[];
  for(let d=0;d<30;d++){
    const big=(d===14||d===29);
    STOCKS.forEach(s=>{
      const pool=NP[s.id],ni=pool[Math.floor(Math.random()*pool.length)];
      let mc=big?0.10:0.03,c=(Math.random()*mc*2)-mc;
      if(ni.p)c=Math.abs(c); else c=-Math.abs(c);
      const prev=h[s.id][h[s.id].length-1];
      const np=Math.max(0.01,parseFloat((prev*(1+c)).toFixed(2)));
      h[s.id].push(np);
      news.unshift({sid:s.id,t:ni.t,p:ni.p,date:`${30-d}일 전`,price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    });
  }
  return{h,news:news.slice(0,60)};
}

      }
      if(st.iconCollection){
        const arr=Array.isArray(st.iconCollection)?st.iconCollection:Object.values(st.iconCollection);
        if(!st.iconMap) st.iconMap={};
        arr.forEach(e=>{ if(e) st.iconMap[e]=true; });
        delete st.iconCollection;
      }
      if(!st.iconMap) st.iconMap={};
    }

    // 1) 공유 상태 구독 (주가·뉴스·설정 등 — 무거운 배열은 제외)
    //    board/homework/patrolLog는 탭 진입 시 get()으로 1회 로드
    const SHARED_KEYS=['stocks','news','todayNews','lastHour','lastMD','dayCount',
      'pd','lotteryWon','police','viceTeachers','cashierName','donationGoals',
      'passwords','teacherPw','realestate','checkLists',
      'extraStudents','removedStudents','teacherIssues','marketPaused','marketMode','stockMode',
      'timerMinutes','timerEnabled','sellFee','returnSystemVersion',
      'marketRunLock','donationTree','homeworkUrl','tabsEnabled'];

    // totalDonation 전용 리스너 — 루트 onValue와 분리해서 race condition 완전 차단
    onValue(ref(db,ROOT+'/totalDonation'),(snap)=>{
      const val=snap.exists()?parseFloat(snap.val()||0):0;
      // 항상 최댓값 유지 (로컬이 더 높으면 유지)
      state.totalDonation=Math.max(state.totalDonation||0, val);
      // donation 탭이 열려있으면 나무 즉시 갱신
      if(cu && cTab==='donation'){
        const donEl=document.getElementById('tab-donation');
        if(donEl&&donEl.classList.contains('active')) rDonation(donEl);
      }
    });

    onValue(ref(db,ROOT),(snap)=>{
      if(!snap.exists()) return;
      const remote=snap.val();

      // 공유 키 병합
      SHARED_KEYS.forEach(k=>{ if(remote[k]!==undefined) state[k]=remote[k]; });
      // donationLog: 객체로 저장된 경우 배열로 변환
      if(state.donationLog && !Array.isArray(state.donationLog)){
        state.donationLog=Object.values(state.donationLog).sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
      }
      if(!state.students) state.students={};
      if(!state.extraStudents) state.extraStudents=[];
      else if(!Array.isArray(state.extraStudents)) state.extraStudents=Object.values(state.extraStudents);
      if(!state.lotteryWon) state.lotteryWon={};

      // board/homework/patrolLog — 원격에 변경 있으면 로컬 플래그 리셋 → 다음 탭 진입 시 재로드
      if(remote._boardTs && remote._boardTs !== state._boardTs){ _boardLoaded=false; state._boardTs=remote._boardTs; }
      if(remote._hwTs   && remote._hwTs   !== state._hwTs)  { _hwLoaded=false;     state._hwTs=remote._hwTs; }
      if(remote._patrolTs && remote._patrolTs !== state._patrolTs){ _patrolLoaded=false; state._patrolTs=remote._patrolTs; }
      STOCKS.forEach(s=>{
        if(!state.stocks?.[s.id]) return;
        const st=state.stocks[s.id];
        if(st.history&&!Array.isArray(st.history)) st.history=Object.values(st.history);
        if(!st.dateHistory) st.dateHistory=[];
        else if(!Array.isArray(st.dateHistory)) st.dateHistory=Object.values(st.dateHistory);
        if(!st.intraday) st.intraday=[];
        else if(!Array.isArray(st.intraday)) st.intraday=Object.values(st.intraday);
      });
      if(state.todayNews?.items&&!Array.isArray(state.todayNews.items))
        state.todayNews.items=Object.values(state.todayNews.items);
      if(state.news&&!Array.isArray(state.news)) state.news=Object.values(state.news);
      if(!state.news) state.news=[];
      if(state.pd&&!Array.isArray(state.pd)) state.pd=Object.values(state.pd);
      // txLog: SHARED_KEYS에서 제외됐으므로 remote에 없을 수 있음, 있으면 정규화만
      if(state.txLog&&!Array.isArray(state.txLog)) state.txLog=Object.values(state.txLog);
      if(!state.txLog) state.txLog=[];
      if(state.donationGoals&&!Array.isArray(state.donationGoals)) state.donationGoals=Object.values(state.donationGoals);
      if(state.news) state.news=state.news.filter(n=>!isCorrupted(n.t));
      if(state.todayNews?.items?.some(n=>isCorrupted(n.t))) delete state.todayNews;

      // students 전체도 병합 (초기 로딩 or 교사용)
      // 학생 로그인 후에는 students 전체 수신 안 함 (자기 경로만 별도 구독)
      if(remote.students && (!cu || cu.type==='teacher')){
        Object.entries(remote.students).forEach(([name,st])=>{
          if(!state.students[name]) state.students[name]={};
          Object.assign(state.students[name], st);
          processStudentData(name, state.students[name]);
        });
      }
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        if(!state.students[s.name])
          state.students[s.name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0}};
        processStudentData(s.name, state.students[s.name]);
      });

      // Re-render current tab
      if(cu && cTab){
        try{
          const el=document.getElementById('tab-'+cTab);
          if(el&&el.classList.contains('active')){
            if(cTab==='invest'){
              const sub=document.getElementById('investSubContent');
              if(sub){
                switch(investSubTab){
                  case'market':rMarket(sub);break;case'company':rCompany(sub);break;
                  case'trade':if(cu.type!=='teacher'){
                    const savedT={};const fIdT=document.activeElement?.id;const ssT=document.activeElement?.selectionStart;
                    sub.querySelectorAll('input').forEach(inp=>{ if(inp.id) savedT[inp.id]=inp.value; });
                    rTrade(sub);
                    Object.entries(savedT).forEach(([id,val])=>{ const inp=document.getElementById(id); if(inp) inp.value=val; });
                    if(fIdT){ const f=document.getElementById(fIdT); if(f){ f.focus(); try{if(ssT!=null)f.setSelectionRange(ssT,ssT);}catch(e){} } }
                  }break;
                  case'deposit':if(cu.type!=='teacher'){
                    const savedD={};const fIdD=document.activeElement?.id;const ssD=document.activeElement?.selectionStart;
                    sub.querySelectorAll('input,select').forEach(inp=>{ if(inp.id) savedD[inp.id]=inp.value; });
                    rDeposit(sub);
                    Object.entries(savedD).forEach(([id,val])=>{ const inp=document.getElementById(id); if(inp) inp.value=val; });
                    if(fIdD){ const f=document.getElementById(fIdD); if(f){ f.focus(); try{if(ssD!=null)f.setSelectionRange(ssD,ssD);}catch(e){} } }
                  }break;
                }
              }
            } else {
              const saved={};
              const focusedId=document.activeElement?.id;
              const selStart=document.activeElement?.selectionStart;
              const selEnd=document.activeElement?.selectionEnd;
              el.querySelectorAll('input,textarea,select').forEach(inp=>{ if(inp.id) saved[inp.id]={val:inp.value}; });
              renderTab(cTab,el);
              Object.entries(saved).forEach(([id,{val}])=>{ const inp=document.getElementById(id); if(inp&&inp.value!==val) inp.value=val; });
              if(focusedId){ const f=document.getElementById(focusedId); if(f){ f.focus(); try{if(selStart!=null)f.setSelectionRange(selStart,selEnd??selStart);}catch(e){} } }
            }
          }
        }catch(e){console.warn('Tab rerender error:',e.message);}
      }
      document.getElementById('weekendBanner').style.display=isWE()?'block':'none';
      if(cu&&cu.type==='student') updateTopbarLabel();
    });

    // Hide loading, show login
    document.getElementById('loadingScreen').style.display='none';
    // 로그인 버튼 활성화 + 이모지 포함해서 그리드 재렌더
    document.querySelectorAll('#loginScreen button').forEach(b=>b.disabled=false);
    populateStudentSelect();

    // 세션 자동 복원 (새로고침 시 재로그인 불필요)
    let restored=false;
    try{
      const saved=sessionStorage.getItem('daize-session');
      if(saved){
        const sess=JSON.parse(saved);
        if(sess.type==='teacher'){
          cu={type:'teacher',name:'선생님',isCashier:false};
          restored=true;
        } else if(sess.type==='student'&&sess.name){
          const name=sess.name;
          // 비밀번호가 존재하고, 타이머 초과 아닌 경우에만 복원
          if(state.passwords&&state.passwords[name]){
            if(state.timerEnabled===false||!isBlockedToday(name)){
              cu={type:'student',name,
                isCashier:name===state.cashierName,
                isPolice:(state.police||[]).includes(name),
                isVice:(state.viceTeachers||[]).includes(name)
              };
              // 학생 자기 경로만 구독 (전체 students 수신 중단)
              if(window._stuOwnUnsub){ window._stuOwnUnsub(); window._stuOwnUnsub=null; }
              window._stuOwnUnsub=onValue(ref(db,ROOT+'/students/'+name),(snap)=>{
                if(!snap.exists()) return;
                if(!state.students) state.students={};
                const raw=snap.val()||{};
                if(!raw.cb||typeof raw.cb!=='object') raw.cb={semi:0,food:0,ent:0};
                if(!raw.hld||typeof raw.hld!=='object') raw.hld={semi:0,food:0,ent:0};
                ['semi','food','ent'].forEach(k=>{
                  if(raw.hld[k]==null||isNaN(raw.hld[k])) raw.hld[k]=0;
                  if(raw.cb[k]==null||isNaN(raw.cb[k])) raw.cb[k]=0;
                });
                if(raw.deps&&!Array.isArray(raw.deps)) raw.deps=Object.values(raw.deps);
                if(!raw.deps) raw.deps=[];
                raw.deps=raw.deps.filter(d=>d&&typeof d==='object');
                if(raw.bal==null||isNaN(raw.bal)) raw.bal=0;
                if(Array.isArray(raw.iconList)){
                  if(!raw.iconMap) raw.iconMap={};
                  raw.iconList.forEach(e=>{ if(e) raw.iconMap[e]=true; });
                }
                if(!raw.iconMap) raw.iconMap={};
                const localUT=state.students[name]?.usedTime;
                if(localUT){
                  if(!raw.usedTime) raw.usedTime={};
                  const today=getTodayKey();
                  if(today&&localUT[today]!=null)
                    raw.usedTime[today]=Math.max(localUT[today],raw.usedTime[today]||0);
                }
                state.students[name]=raw;
              });
              restored=true;
            } else {
              sessionStorage.removeItem('daize-session');
            }
          } else {
            sessionStorage.removeItem('daize-session');
          }
        }
      }
    }catch(e){}

    if(restored){
      openApp();
      showToast('✅ 자동 로그인 완료!');
    } else {
      document.getElementById('loginScreen').style.display='flex';
      showToast('✅ 로컬 모드로 시작!');
    }
    // 다크모드 버튼 아이콘 초기화
    const dtBtn=document.getElementById('darkToggle');
    if(dtBtn) dtBtn.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
  } catch(e){
    document.getElementById('loadingMsg').textContent='연결 실패: '+e.message+' — 새로고침 해주세요.';
    console.error(e);
  }
}
boot();

// ── 시장 시간 헬퍼
// 8:00 — 오늘의 뉴스 3건 발행
// 9:00, 11:00, 12:50, 14:00 — 시세 변동 (뉴스 영향 + 랜덤 무빙) 4회
// 14:00 — 최종 종가 확정
// 거래 가능 시간: 평일 8:40~14:00

function isMarketOpen(){
  if(isWE()) return false;
  const now=kst();
  const h=now.getHours(), m=now.getMinutes();
  const mins=h*60+m;
  return mins>=8*60+40 && mins<14*60;
}

function getMarketUpdateKey(now){
  const h=now.getHours(), m=now.getMinutes();
  const dateStr=now.toDateString();
  if(h>=8&&h<9)               return `${dateStr}-0800`; // 뉴스 발행
  if(h===9)                    return `${dateStr}-0900`;
  if(h===11)                   return `${dateStr}-1100`;
  if(h===12&&m>=50||h===13&&m<50) return `${dateStr}-1250`;
  if(h>=14)                    return `${dateStr}-1400`;
  return null;
}
function marketHistoryPathKey(hourKey){
  return String(hourKey||'').replace(/[^0-9A-Za-z가-힣_-]/g,'_');
}

function getStudentDefaults(){
  return {bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0},iconSpent:0,iconMap:{},freeIconCoupons:0};
}

function ensureStudentShape(st){
  const base=getStudentDefaults();
  const merged={...base,...(st||{})};
  merged.hld={...base.hld,...(merged.hld||{})};
  merged.cb={...base.cb,...(merged.cb||{})};
  if(merged.deps&&!Array.isArray(merged.deps)) merged.deps=Object.values(merged.deps);
  if(!merged.deps) merged.deps=[];
  if(merged.iconCollection){
    const arr=Array.isArray(merged.iconCollection)?merged.iconCollection:Object.values(merged.iconCollection);
    merged.iconMap={...(merged.iconMap||{})};
    arr.forEach(e=>{ if(e) merged.iconMap[e]=true; });
    delete merged.iconCollection;
  }
  if(!merged.iconMap) merged.iconMap={};
  return merged;
}

async function claimMarketWindow(hourKey){
  const claimKey=marketHistoryPathKey(hourKey);
  const lockRef=ref(db,ROOT+`/marketHistory/${claimKey}`);
  const result=await runTransaction(lockRef,(current)=>{
    if(current) return;
    return {hourKey, claimedAt:new Date().toISOString()};
  });
  return !!result.committed;
}

function marketStatus(){
  if(state?.marketPaused) return '교사 일시정지 중';
  if(isWE()) return '주말 휴장';
  const now=kst();
  const h=now.getHours(),m=now.getMinutes();
  const mins=h*60+m;
  if(mins<8*60) return '뉴스 발행 전 (8:00)';
  if(mins<8*60+40){
    const hasNews=(state.todayNews&&state.todayNews.date===now.toDateString());
    return hasNews?'📰 뉴스 확인 중 · 8:40 개장':'뉴스 발행 중...';
  }
  if(mins<14*60){
    const schedule=[[9,0,'1차'],[11,0,'2차'],[12,50,'3차'],[14,0,'종가 확정']];
    const next=schedule.find(([hh,mm])=>hh*60+mm>mins);
    if(next) return `장중 🕐 다음 시세 변동 ${next[0]}:${String(next[1]).padStart(2,'0')} (${next[2]})`;
    return '장중';
  }
  return '🔔 14:00 종가 확정 · 장 마감';
}

async function runMarket(){
  if(!state) return;
  if(isWE()) return;
  if(state.marketPaused) return;
  if(!cu || cu.type!=='teacher') return;

  const now=kst();
  const dateStr=now.toDateString();
  const hourKey=getMarketUpdateKey(now);
  if(!hourKey) return;
  const historyKey=marketHistoryPathKey(hourKey);
  if(state.lastHour===hourKey) return;
  if(state.marketHistory && state.marketHistory[historyKey]) return;

  const claimed=await claimMarketWindow(hourKey);
  if(!claimed) return;

  const isNews=hourKey.endsWith('-0800');
  const isFinal=hourKey.endsWith('-1400');
  const isFirstToday=(state.lastMD!==dateStr);
  state.lastHour=hourKey;

  // ── 8:00: 오늘의 뉴스 발행 (시세 변동 없음)
  if(isNews){
    const todayNews=[];
    STOCKS.forEach(s=>{
      const pool=NP[s.id];
      let ni=null;
      if(state.teacherIssues&&state.teacherIssues.length>0){
        const issue=state.teacherIssues.find(i=>i.sid===s.id&&!i.used);
        if(issue){ni={t:issue.text,p:issue.p};issue.used=true;}
      }
      if(!ni) ni=pool[Math.floor(Math.random()*pool.length)];
      todayNews.push({sid:s.id,t:ni.t,p:ni.p});
      state.news.unshift({
        sid:s.id,t:ni.t,p:ni.p,
        date:dStr(),price:state.stocks[s.id].price,prev:state.stocks[s.id].price,
        chg:'0.00',time:'8:00',isBreaking:true
      });
    });
    state.todayNews={date:dateStr,items:todayNews};
    if(state.teacherIssues) state.teacherIssues=state.teacherIssues.filter(i=>!i.used);
    if(state.news.length>100) state.news=state.news.slice(0,100);
    update(ref(db,ROOT),{todayNews:state.todayNews,news:state.news,lastHour:state.lastHour,teacherIssues:state.teacherIssues||null,marketRunLock:hourKey,[`marketHistory/${historyKey}`]:{hourKey,type:'news',doneAt:new Date().toISOString()}}).catch(()=>{});
    return;
  }

  if(isFinal){ state.lastMD=dateStr; state.dayCount++; }

  if(isFirstToday||!state.stocks[STOCKS[0].id].todayOpen?.[dateStr]){
    STOCKS.forEach(s=>{
      if(!state.stocks[s.id].todayOpen) state.stocks[s.id].todayOpen={};
      state.stocks[s.id].todayOpen[dateStr]=state.stocks[s.id].price;
    });
  }

  const big=isFinal&&(state.dayCount%22===0);
  const modeMap={
    normal:{max:0.015,bias:0},
    bull:  {max:0.02, bias:0.004},
    bear:  {max:0.02, bias:-0.004},
    flat:  {max:0.005,bias:0},
    surge: {max:0.06, bias:0.03},
    crash: {max:0.07, bias:-0.04},
  };
  const globalMode=modeMap[state.marketMode||'normal']||modeMap.normal;
  const scale=isFinal?1:0.33;
  const todayNewsItems=(state.todayNews&&state.todayNews.date===dateStr)?state.todayNews.items:[];
  const timeLabel=hourKey.split('-').pop();
  const timeMap={'0900':'9:00','1100':'11:00','1250':'12:50','1400':'14:00'};
  const timeStr=timeMap[timeLabel]||'';

  STOCKS.forEach(s=>{
    const stockModeKey=(state.stockMode||{})[s.id]||'normal';
    const stockMode=modeMap[stockModeKey]||modeMap.normal;
    const baseMode=stockModeKey==='normal'?globalMode:stockMode;
    const m=big?{max:0.08*scale,bias:baseMode.bias*1.5}:{max:baseMode.max*scale,bias:baseMode.bias*scale};

    const todayNI=todayNewsItems.find(n=>n.sid===s.id);
    let c=(Math.random()*m.max*2-m.max)+m.bias;
    if(todayNI){
      // 80% 확률로 뉴스 방향이 시세에 반영됨 (20%는 역방향 or 무시)
      const newsApplied=Math.random()<0.8;
      if(newsApplied){
        const newsInfluence=0.25+Math.random()*0.25;
        if(todayNI.p) c=c*(1-newsInfluence)+Math.abs(c)*newsInfluence;
        else          c=c*(1-newsInfluence)-Math.abs(c)*newsInfluence;
      }
    }
    c=c-0.0005*scale;

    const prev=state.stocks[s.id].price;
    const np=Math.max(1,parseFloat((prev*(1+c)).toFixed(2)));
    state.stocks[s.id].price=np;

    if(!state.stocks[s.id].intraday) state.stocks[s.id].intraday=[];
    state.stocks[s.id].intraday.push({time:timeStr,price:np,prev,chg:((np-prev)/prev*100).toFixed(2)});
    if(state.stocks[s.id].intraday.length>8) state.stocks[s.id].intraday=state.stocks[s.id].intraday.slice(-8);

    state.news.unshift({
      sid:s.id,t:todayNI?todayNI.t:'시장 변동',p:todayNI?todayNI.p:(c>=0),
      date:dStr(),price:np,prev,
      chg:((np-prev)/prev*100).toFixed(2),
      time:timeStr,isFinal
    });

    if(isFinal){
      state.stocks[s.id].history.push(np);
      if(state.stocks[s.id].history.length>61) state.stocks[s.id].history.shift();
      if(!state.stocks[s.id].dateHistory) state.stocks[s.id].dateHistory=[];
      state.stocks[s.id].dateHistory.push(`${now.getMonth()+1}/${now.getDate()}`);
      if(state.stocks[s.id].dateHistory.length>61) state.stocks[s.id].dateHistory.shift();
      state.stocks[s.id].intraday=[];
    }
  });

  if(state.news.length>100) state.news=state.news.slice(0,100);

  if(isFinal){
    const now2=kst();
    STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
      const st=state.students[s.name];
      if(!st||!st.deps) return;
      st.deps.forEach(dep=>{
        if(!dep.done&&!dep.er&&new Date(dep.md)<=now2){
          dep.done=true;
          const int=Math.round(dep.amt*dep.rate*dep.mon);
          const tax=Math.round(int*0.01);
          st.bal=parseFloat((st.bal+dep.amt+int-tax).toFixed(2));
          dep.ret=dep.amt+int-tax;dep.tax=tax;
        }
      });
    });
    // ── 부동산 일일 수익 지급
    const re=state.realestate;
    if(re&&re.plots){
      const reIncomeMap={};
      Object.entries(re.plots).forEach(([pid,plot])=>{
        if(!plot||!plot.owner) return;
        let income=reCityIncome(pid);
        const bv=reBuildingInfo(plot.building);
        if(bv) income=bv.income;
        reIncomeMap[plot.owner]=(reIncomeMap[plot.owner]||0)+income;
      });
      Object.entries(reIncomeMap).forEach(([name,income])=>{
        const st=state.students[name];
        if(!st) return;
        st.bal=parseFloat((st.bal+income).toFixed(2));
        addTxLog('deposit',name,income,'시스템','부동산 일일 수익');
      });
    }
  }
  const marketUpd={stocks:state.stocks,news:state.news,lastHour:state.lastHour,lastMD:state.lastMD??null,dayCount:state.dayCount??0,marketRunLock:hourKey,[`marketHistory/${historyKey}`]:{hourKey,type:isFinal?'close':'intraday',doneAt:new Date().toISOString()}};
  update(ref(db,ROOT),marketUpd).catch(()=>{});
  if(isFinal){
    STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
      const st=state.students[s.name];
      if(st&&st.deps) update(ref(db,ROOT+'/students/'+s.name),{bal:st.bal,deps:st.deps}).catch(()=>{});
    });
    // 부동산 수익 txLog 저장 (배치)
  }
}

// ── 접속 타이머 (학생 전용, 하루 N분)
let sessionTimer=null,sessionLeft=0;

function getTodayKey(){
  const d=kst();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function getSessionLimit(){ return ((state&&state.timerMinutes)||15)*60; }

function getUsedSeconds(name){
  return (state?.students?.[name]?.usedTime?.[getTodayKey()])||0;
}
async function saveUsedSeconds(name,secs){
  const st=state?.students?.[name];
  if(!st) return;
  if(!st.usedTime) st.usedTime={};
  const today=getTodayKey();
  st.usedTime[today]=secs;
  // usedTime만 직접 경로에 저장 (set으로 해당 날짜 키만)
  try{
    await set(ref(db,ROOT+`/students/${name}/usedTime/${today}`),secs);
  }catch(e){}
}
async function getUsedSecondsFromDB(name){
  // 로그인 시 Firebase에서 직접 읽어 정확한 값 사용
  try{
    const today=getTodayKey();
    const snap=await get(ref(db,ROOT+`/students/${name}/usedTime/${today}`));
    return snap.exists()?parseInt(snap.val()||0):0;
  }catch(e){ return getUsedSeconds(name); }
}
function isBlockedToday(name){
  // state에 저장된 값으로 체크 (로그인 시점에 최신값이 state에 반영되어 있음)
  const used=getUsedSeconds(name);
  const limit=getSessionLimit();
  return used>=limit;
}

async function startSessionTimer(){
  try{
  if(sessionTimer){ clearInterval(sessionTimer); sessionTimer=null; }
  if(!cu||cu.type==='teacher') return;
  if(cu.isCashier||cu.isPolice){
    const d=document.getElementById('timerDisp'); if(d) d.style.display='none'; return;
  }
  if(state&&state.timerEnabled===false){
    const d=document.getElementById('timerDisp'); if(d) d.style.display='none'; return;
  }
  const limit=getSessionLimit();
  let usedFromDB=0;
  try{ usedFromDB=await getUsedSecondsFromDB(cu.name); }catch(e){ usedFromDB=getUsedSeconds(cu.name); }
  if(state?.students?.[cu.name]){
    if(!state.students[cu.name].usedTime) state.students[cu.name].usedTime={};
    state.students[cu.name].usedTime[getTodayKey()]=usedFromDB;
  }
  sessionLeft=Math.max(0,limit-usedFromDB);
  const d=document.getElementById('timerDisp'); if(d) d.style.display='';
  if(sessionLeft<=0){ forceLogoutByTimer(); return; }
  updateTimerDisplay();
  let timerTick=0;
  sessionTimer=setInterval(()=>{
    sessionLeft=Math.max(0,sessionLeft-1);
    timerTick++;
    // Firebase에는 60초마다만 저장 (매초 저장 → 트래픽 60배 절감)
    if(timerTick%60===0 || sessionLeft<=0){
      saveUsedSeconds(cu.name,getSessionLimit()-sessionLeft);
    }
    // 로컬 state에는 매초 반영
    if(state?.students?.[cu.name]){
      if(!state.students[cu.name].usedTime) state.students[cu.name].usedTime={};
      state.students[cu.name].usedTime[getTodayKey()]=getSessionLimit()-sessionLeft;
    }
    updateTimerDisplay();
    if(sessionLeft<=0){ clearInterval(sessionTimer); sessionTimer=null; forceLogoutByTimer(); }
  },1000);
  }catch(e){console.warn('Timer error:',e);}
}

function updateTimerDisplay(){
  const d=document.getElementById('timerDisp');
  if(!d) return;
  if(!cu||cu.type==='teacher'||state?.timerEnabled===false){d.style.display='none';return;}
  const m=Math.floor(sessionLeft/60),s=sessionLeft%60;
  d.textContent=`⏱ ${m}:${String(s).padStart(2,'0')}`;
  d.style.display='';
  d.style.background=sessionLeft<120?'#fee2e2':sessionLeft<300?'#fef3c7':'#d1fae5';
  d.style.color=sessionLeft<120?'#991b1b':sessionLeft<300?'#92400e':'#065f46';
}

function forceLogoutByTimer(){
  if(sessionTimer){ clearInterval(sessionTimer); sessionTimer=null; }
  const name=cu?.name||'';
  const mins=(state?.timerMinutes)||15;
  // 오늘 재로그인 차단 — limit+1 저장
  if(name) saveUsedSeconds(name, getSessionLimit()+1);
  // 즉시 강제 로그아웃
  doLogout();
  showToast(`⏱ ${name} 오늘 접속 시간(${mins}분) 종료. 내일 다시 접속하세요.`);
}

// Cost basis
function updateCB(ctxOrName,nameOrSid,sidOrQty,priceOrQty,buyOrPrice,maybeBuy){
  const useState=typeof ctxOrName==='string'?state:ctxOrName;
  const name=typeof ctxOrName==='string'?ctxOrName:nameOrSid;
  const sid=typeof ctxOrName==='string'?nameOrSid:sidOrQty;
  const qty=typeof ctxOrName==='string'?sidOrQty:priceOrQty;
  const price=typeof ctxOrName==='string'?priceOrQty:buyOrPrice;
  const buy=typeof ctxOrName==='string'?buyOrPrice:maybeBuy;
  const st=useState.students[name];
  if(!st.cb) st.cb={semi:0,food:0,ent:0};
  if(buy){
    const cq=st.hld[sid]||0,cc=st.cb[sid]||0;
    st.cb[sid]=cq+qty>0?(cc*cq+price*qty)/(cq+qty):0;
  } else {
    if((st.hld[sid]||0)-qty<=0) st.cb[sid]=0;
  }
}

    };

    // 학생 자기 데이터만 별도 구독 시작 (전체 students 수신 중단)
    if(window._stuOwnUnsub){ window._stuOwnUnsub(); window._stuOwnUnsub=null; }
    window._stuOwnUnsub=onValue(ref(db,ROOT+'/students/'+name),(snap)=>{
      if(!snap.exists()) return;
      if(!state.students) state.students={};
      let raw=snap.val()||{};

      if(!raw.cb||typeof raw.cb!=='object') raw.cb={semi:0,food:0,ent:0};
      if(!raw.hld||typeof raw.hld!=='object') raw.hld={semi:0,food:0,ent:0};
      // hld/cb 개별 키 null 방어
      ['semi','food','ent'].forEach(k=>{

        if(raw.cb[k]==null||isNaN(raw.cb[k])) raw.cb[k]=0;
      });
      if(raw.deps&&!Array.isArray(raw.deps)) raw.deps=Object.values(raw.deps);
      if(!raw.deps) raw.deps=[];
      raw.deps=raw.deps.filter(d=>d&&typeof d==='object'); // null 항목 제거
      if(raw.bal==null||isNaN(raw.bal)) raw.bal=0;
      if(Array.isArray(raw.iconList)){
        if(!raw.iconMap) raw.iconMap={};
        raw.iconList.forEach(e=>{ if(e) raw.iconMap[e]=true; });
      }
      if(!raw.iconMap) raw.iconMap={};
      // txLog: 학생 경로에서 받은 값 저장
      if(raw.txLog){
        if(!Array.isArray(raw.txLog)) raw.txLog=Object.values(raw.txLog||{});
        raw.txLog.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
      } else { raw.txLog=[]; }
      const localUT=state.students[name]?.usedTime;
      if(localUT){
        if(!raw.usedTime) raw.usedTime={};
        const today=getTodayKey();
        if(today&&localUT[today]!=null)
          raw.usedTime[today]=Math.max(localUT[today],raw.usedTime[today]||0);

      state.students[name]=raw;

          }
        }catch(e){ console.error('[stuOwnListener rerender]',e); }
      }
    });

  }
}

  const emoji=stuEmoji(cu.name);
  let lbl=`${emoji} ${cu.name}`;
  if(cu.isCashier)lbl+=` (은행장)`;
  else if(cu.isPolice)lbl+=` (경찰 🚔)`;
  else if(cu.isVice)lbl+=` (부담임 📋)`;
  document.getElementById('topbarUser').textContent=lbl;
  // 오늘의 투자 손익
  const pnlEl=document.getElementById('topbarTodayPnl');
  if(pnlEl&&state?.stocks&&state?.students?.[cu.name]){
    const st=state.students[cu.name];
    let todayPnl=0;
    STOCKS.forEach(s=>{
      const stk=state.stocks[s.id];
      const q=st.hld?.[s.id]||0;
      if(q>0&&stk){
        const cur=stk.price||0;
        const prev=stk.history?.length>1?stk.history[stk.history.length-2]:cur;
        todayPnl+=parseFloat(((cur-prev)*q).toFixed(2));
      }
    });
    if(todayPnl===0){
      pnlEl.style.display='none';
    } else {
      const pos=todayPnl>=0;
      pnlEl.style.display='';
      pnlEl.style.background=pos?'var(--sl)':'var(--dl)';
      pnlEl.style.color=pos?'var(--suc)':'var(--dan)';
      pnlEl.textContent=`오늘의 투자 손익 ${pos?'+':''}${fE2(todayPnl)}`;
    }
  }
}

function updateShinmungoBadge(){
  if(cu?.type!=='teacher') return;
  const unread=_smgPosts.filter(p=>!p.read).length;
  // 하단 탭바 버튼에 뱃지 표시
  document.querySelectorAll('.bt[data-tab="shinmungo"]').forEach(btn=>{
    let badge=btn.querySelector('.smg-badge');
    if(unread>0){
      if(!badge){
        badge=document.createElement('span');
        badge.className='smg-badge';
        badge.style.cssText='position:absolute;top:2px;right:6px;background:#ef4444;color:white;font-size:.58rem;font-weight:700;border-radius:999px;padding:.05rem .3rem;line-height:1.4;';
        btn.style.position='relative';
        btn.appendChild(badge);
      }
      badge.textContent=unread;
    } else if(badge){
      badge.remove();
    }
  });
}

function switchTab(id){
  cTab=id;
  document.querySelectorAll('.nt').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.bt').forEach(t=>t.classList.toggle('active',t.dataset.tab===id));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  const el=document.getElementById('tab-'+id);
  if(el){
    el.classList.add('active');
    try{ renderTab(id,el); }
    catch(e){
      console.error(`[renderTab:${id}]`, e);
      el.innerHTML=`<div class="card"><div style="color:var(--dan);padding:1rem;">
        ⚠️ 탭 로드 오류: <code>${e.message}</code><br/>
        <button class="btn bs bsm" style="margin-top:.5rem;" onclick="switchTab('${id}')">🔄 다시 시도</button>
      </div></div>`;
    }
  }
}
// board/homework/patrolLog lazy load 플래그
let _boardLoaded=false, _hwLoaded=false, _patrolLoaded=false;

function lazyLoadBoard(el, cb){
  if(_boardLoaded){cb();return;}
  el.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--g500);">📋 불러오는 중...</div>`;
  get(ref(db,ROOT+'/board')).then(snap=>{
    _boardLoaded=true;
    if(snap.exists()){
      const raw=snap.val();
      // Firebase object → array (키 순서대로)
      state.board=Object.values(raw).sort((a,b)=>(b.id||'').localeCompare(a.id||''));
    } else { state.board=[]; }
    cb();
  }).catch(()=>{state.board=[];cb();});
}
function lazyLoadHomework(el, cb){
  if(_hwLoaded){cb();return;}
  el.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--g500);">📋 불러오는 중...</div>`;
  get(ref(db,ROOT+'/homework')).then(snap=>{
    _hwLoaded=true;
    if(snap.exists()){
      const raw=snap.val();
      state.homework=Array.isArray(raw)?raw:Object.values(raw);
    } else { state.homework=[]; }
    cb();
  }).catch(()=>{state.homework=[];cb();});
}
function lazyLoadPatrol(el, cb){
  if(_patrolLoaded){cb();return;}
  el.innerHTML=`<div style="text-align:center;padding:2rem;color:var(--g500);">📋 불러오는 중...</div>`;
  get(ref(db,ROOT+'/patrolLog')).then(snap=>{
    _patrolLoaded=true;
    if(snap.exists()){
      const raw=snap.val();
      state.patrolLog=Array.isArray(raw)?raw:Object.values(raw);
      state.patrolLog.sort((a,b)=>b.date.localeCompare(a.date));
    } else { state.patrolLog=[]; }

  }).catch(()=>{state.patrolLog=[];cb();});
}

// 복권 이모지 암호화 헬퍼 (base64 + 간단 XOR)
const _LK='\x64\x61\x69\x7a\x65'; // 'daize'
function _enc(arr){
  const s=JSON.stringify(arr);
  let x='';for(let i=0;i<s.length;i++)x+=String.fromCharCode(s.charCodeAt(i)^_LK.charCodeAt(i%_LK.length));
  const bytes=new TextEncoder().encode(x);
  let b='';bytes.forEach(b2=>b+=String.fromCharCode(b2));
  return btoa(b);
}
function _dec(str){
  try{
    const bin=atob(str);
    const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
    const x=new TextDecoder().decode(bytes);
    let s='';for(let i=0;i<x.length;i++)s+=String.fromCharCode(x.charCodeAt(i)^_LK.charCodeAt(i%_LK.length));
    return JSON.parse(s);
  }catch(e){return['🍀','💎','🌟','🏆','🔮'];}
}
// 복권 이모지 읽기/쓰기
function getLotteryEmojis(){
  if(state._le) return _dec(state._le);
  if(state.lotteryEmojis) return state.lotteryEmojis; // 구버전 호환
  return _dec(''); // 기본값
}
function setLotteryEmojis(arr){
  state._le=_enc(arr);
  delete state.lotteryEmojis; // 평문 제거
}

function doIconPurchaseWithCoupon(){
  const st=ensureReturnFields(state.students[cu.name]);
  const disp=document.getElementById('selectedIconDisp');
  const sel=disp?disp.textContent.trim():'';
  if(!sel){showToast('이모지를 선택해주세요.');return;}
  if((st.freeIconCoupons||0)<=0){showToast('자유 이모지 구입권이 없습니다.');return;}
  if(st.iconMap&&st.iconMap[sel]){showToast('이미 보유한 이모지입니다.');return;}
  st.freeIconCoupons=(st.freeIconCoupons||0)-1;

  st.iconMap[sel]=true;
  st.customEmoji=sel;
  // 거래 기록 (쿠폰 사용은 잔액 차감 없음 — 0조개 기록)
  addTxLog('withdraw',cu.name,0,cu.name,`🎟️ 이모지 구입권으로 ${sel} 획득 (잔액 차감 없음)`);
  const stuUpd={freeIconCoupons:st.freeIconCoupons,customEmoji:st.customEmoji,
    iconList:Object.keys(st.iconMap).filter(e=>e&&e.trim())};
  update(ref(db,ROOT+'/students/'+cu.name),stuUpd).catch(()=>{});
  closeModal();
  playSound('buy');
  showToast(`🎟️ 구입권 사용! ${sel} 이모지 획득!`);

}

function miniChart(history,isUp){
  const data=history.slice(-31);if(data.length<2)return'';
  const min=Math.min(...data),max=Math.max(...data);
  const w=300,h=50,rng=max-min||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-min)/rng)*h}`).join(' ');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:100%;"><polyline points="${pts}" fill="none" stroke="${isUp?'#0e9f6e':'#e02424'}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}

function exTrade(sid,action){
  if(isWE()){showToast('주말에는 거래가 불가능합니다. 📅');return;}
  const st=state.students[cu.name],stk=state.stocks[sid];
  const qty=parseInt(document.getElementById('q-'+sid)?.value||0);
  if(!qty||qty<=0){showToast('수량을 입력해주세요.');return;}
  const sn=STOCKS.find(s=>s.id===sid).name;
  const sEmoji=STOCKS.find(s=>s.id===sid).emoji;
  if(action==='buy'){
    const cost=parseFloat((qty*stk.price).toFixed(2));
    if(cost>st.bal){showToast('투자 가능 금액이 부족합니다!');return;}
    openModal(`${sEmoji} ${sn} 매수 확인`,`
      <div style="text-align:center;padding:.3rem 0;">
        <div style="font-size:2.5rem;margin-bottom:.4rem;">${sEmoji}</div>
        <div style="font-size:1rem;font-weight:700;margin-bottom:.2rem;">${sn} ${qty}주 매수</div>
        <div style="font-size:.85rem;color:var(--g600);margin-bottom:.6rem;">주당 ${fE2(stk.price)}</div>

          <span class="tsm">결제 금액</span><span class="tsm fb tdan">${fE2(cost)}</span>
        </div>
        <div style="font-size:.75rem;color:var(--g500);margin-top:.4rem;">잔액: ${fE2(st.bal)} → ${fE2(st.bal-cost)}</div>
      </div>
    `,[
      {l:'매수 확정',c:'bsuc',f:()=>{
        closeModal();doExTrade(sid,'buy',qty);
      }},{l:'취소',c:'bs',f:closeModal}
    ]);
  } else {
    const held=st.hld[sid]||0;
    if(qty>held){showToast(`보유 주식 부족 (보유: ${held}주)`);return;}
    const fee=parseFloat((qty*(state.sellFee||1)).toFixed(2));

        <div style="font-size:1rem;font-weight:700;margin-bottom:.2rem;">${sn} ${qty}주 매도</div>

function openDep(){
  const st=state.students[cu.name];
  const amt=parseFloat(document.getElementById('dA').value),mon=parseInt(document.getElementById('dM').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  if(amt>st.bal){showToast('투자 가능 금액 부족');return;}
  const rate=mon===1?0.03:0.04,now=kst(),mat=new Date(now);
  mat.setMonth(mat.getMonth()+mon);
  st.bal=parseFloat((st.bal-amt).toFixed(2));
  if(!st.deps)st.deps=[];
  st.deps.push({amt,mon,rate,sd:now.toISOString(),md:mat.toISOString(),done:false,er:false});
  // dep0은 외부 입금 총액이므로 예금 가입 시 변경하지 않음
  // 부분 업데이트
  update(ref(db,ROOT+'/students/'+cu.name),{bal:st.bal,deps:st.deps}).catch(()=>{});
  showToast(`${mon}개월 예금 가입 완료!`);playSound('deposit');
  const depEl=document.getElementById('investSubContent')||document.getElementById('tab-deposit');
  if(depEl) rDeposit(depEl);
}
function earlyR(idx){

  const dep=active[idx];if(!dep)return;
  openModal('중도해지 확인',`<p class="tsm">이자 없이 원금 <strong>${fE(dep.amt)}</strong>만 돌려받습니다.</p>`,[
    {l:'중도해지',c:'bdan',f:()=>{
      dep.er=true;dep.ret=dep.amt;
      st.bal=parseFloat((st.bal+dep.amt).toFixed(2));
      update(ref(db,ROOT+'/students/'+cu.name),{bal:st.bal,deps:st.deps}).catch(()=>{});

function rRank(el){
  const resetDate=state.rankResetDate||null;
  const now=kst();
  const thisMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const thisYear=`${now.getFullYear()}`;
  const monthLabel=`${now.getMonth()+1}월`;
  const yearLabel=`${now.getFullYear()}년`;

  const all=realStudents().map(s=>{
    const p=calcP(s.name);
    const st=state.students[s.name];
    const iconCount=Object.keys(st?.iconMap||{}).length;
    const logs=(state.donationLog||[]).filter(d=>d.name===s.name);
    const donMonthly=logs.filter(d=>d.ts&&d.ts.startsWith(thisMonth)).reduce((a,d)=>a+(d.amount||0),0);
    const donYearly=logs.filter(d=>d.ts&&d.ts.startsWith(thisYear)).reduce((a,d)=>a+(d.amount||0),0);
    const depTotal=(st?.deps||[]).filter(d=>!d.done&&!d.er).reduce((a,d)=>a+(d.amt||0),0);

    return{name:s.name,no:s.no,...p,iconCount,donMonthly,donYearly,depTotal};
  });
  const isMine=r=>cu.type==='student'&&r.name===cu.name;
  const isTeacher=cu.type==='teacher';

  // 이전 순위 저장/비교
  if(!window._prevRanks) window._prevRanks={};
  function saveRanks(key,rows){
    const cur={};
    rows.forEach((r,i)=>cur[r.name]=i+1);
    const prev=window._prevRanks[key]||{};
    window._prevRanks[key]=cur;
    return prev;
  }
  function rankDelta(prevRanks,name,curRank){
    if(!prevRanks[name]) return '';
    const diff=prevRanks[name]-curRank;
    if(diff===0) return '';
    if(diff>0) return `<span style="font-size:.62rem;color:var(--suc);font-weight:700;margin-left:.3rem;">▲${diff}</span>`;
    return `<span style="font-size:.62rem;color:var(--dan);font-weight:700;margin-left:.3rem;">▼${Math.abs(diff)}</span>`;
  }

  function mkRows(arr,sortFn){
    return arr.slice().sort((a,b)=>{ const r=sortFn(a,b); return r!==0?r:(a.no||0)-(b.no||0); });
  }

  function rankSection(key,title,emoji,color,rows,valFn,subFn,emptyMsg,showMore){
    const display=showMore?15:5;
    const prevRanks=saveRanks(key,rows);
    let h=`<div style="background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:.85rem;overflow:hidden;">
      <div style="padding:.75rem 1rem .5rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:.5rem;">
        <span style="font-size:1.4rem;">${emoji}</span>
        <span style="font-weight:700;font-size:.92rem;flex:1;">${title}</span>
        ${rows.length>5?`<button onclick="toggleRankMore('${key}')" class="btn bs bsm" style="font-size:.68rem;padding:.2rem .5rem;">${showMore?'접기':'15위까지 보기'}</button>`:''}
      </div>`;
    if(!rows.length){
      h+=`<div class="empty" style="padding:.85rem;">${emptyMsg}</div></div>`;
      return h;
    }
    const getRank=(arr,idx)=>{
      if(idx===0) return 1;
      const cur=valFn(arr[idx]), prev=valFn(arr[idx-1]);
      return cur===prev ? getRank(arr,idx-1) : idx+1;
    };
    rows.slice(0,display).forEach((r,i)=>{
      const rk=getRank(rows,i);
      const medal=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':`${rk}`;
      const isMy=isMine(r);
      const delta=rankDelta(prevRanks,r.name,rk);

          <div style="font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${stuEmoji(r.name)} ${r.name}${delta}</div>
          <div style="font-size:.72rem;color:var(--g500);margin-top:.05rem;">${subFn(r)}</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:${color};white-space:nowrap;">${valFn(r)}</div>
      </div>`;
    });
    const myIdx=rows.findIndex(r=>isMine(r));
    if(!isTeacher&&myIdx>=display){
      const r=rows[myIdx];
      const myRk=getRank(rows,myIdx);
      const delta=rankDelta(prevRanks,r.name,myRk);
      h+=`<div style="display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;
        background:var(--pl);border-left:3px solid ${color};border-top:2px dashed var(--g200);">
        <div style="min-width:1.6rem;text-align:center;font-size:.82rem;font-weight:700;">${myRk}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:.85rem;">${stuEmoji(r.name)} ${r.name}${delta} <span style="font-size:.7rem;color:var(--g500);">(내 순위)</span></div>
          <div style="font-size:.72rem;color:var(--g500);">${subFn(r)}</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:${color};white-space:nowrap;">${valFn(r)}</div>
      </div>`;
    }
    h+=`</div>`;
    return h;
  }

  const profitRows=mkRows(all.filter(r=>r.inv>0),(a,b)=>b.tpnl-a.tpnl||b.tpct-a.tpct);
  const pctRows=mkRows(all.filter(r=>r.inv>0),(a,b)=>b.tpct-a.tpct||b.tpnl-a.tpnl);
  const donMonthRows=mkRows(all.filter(r=>r.donMonthly>0),(a,b)=>b.donMonthly-a.donMonthly);
  const donYearRows=mkRows(all.filter(r=>r.donYearly>0),(a,b)=>b.donYearly-a.donYearly);
  const emojiRows=mkRows(all.filter(r=>r.iconCount>0),(a,b)=>b.iconCount-a.iconCount);
  const depRows=mkRows(all.filter(r=>r.depTotal>0),(a,b)=>b.depTotal-a.depTotal);

  const resetStr=resetDate?`최근 초기화: ${dStr(new Date(resetDate))}`:'초기화 기록 없음';
  
  // Top 3 포디움
  function podium(rows,label){
    if(rows.length<1) return '';
    const top3=rows.slice(0,3);
    const order=top3.length>=3?[top3[1],top3[0],top3[2]]:(top3.length===2?[top3[1],top3[0]]:[top3[0]]);
    const heights=top3.length>=3?['5rem','6.5rem','4rem']:(top3.length===2?['5rem','6.5rem']:['6.5rem']);
    const medals=['🥈','🥇','🥉'];
    const mIdx=top3.length>=3?[0,1,2]:(top3.length===2?[0,1]:[1]);
    return `<div style="display:flex;justify-content:center;align-items:flex-end;gap:.5rem;margin-bottom:.3rem;">
      ${order.map((r,i)=>{
        const isMy=cu.type==='student'&&r.name===cu.name;
        return `<div style="text-align:center;flex:1;max-width:100px;">
          <div style="font-size:${i===1||(top3.length<3&&i===0)?'2.2rem':'1.6rem'};margin-bottom:.2rem;">${stuEmoji(r.name)}</div>
          <div style="font-size:${i===1||(top3.length<3&&i===0)?'1.3rem':'1rem'};margin-bottom:.15rem;">${medals[mIdx[i]]}</div>
          <div style="background:${isMy?'rgba(96,165,250,.3)':'rgba(255,255,255,.15)'};border-radius:8px 8px 0 0;height:${heights[i]};display:flex;flex-direction:column;justify-content:flex-start;padding-top:.5rem;">
            <div style="font-size:.72rem;font-weight:700;color:white;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 .2rem;">${r.name}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }
  
  let h=`
  <div style="background:linear-gradient(135deg,#1e40af,#7c3aed);border-radius:var(--r);padding:1.2rem 1.2rem .6rem;margin-bottom:.9rem;text-align:center;overflow:hidden;">

    <div style="color:white;font-weight:700;font-size:1.05rem;">랭킹</div>
    <div style="color:rgba(255,255,255,.7);font-size:.72rem;margin-top:.1rem;margin-bottom:.8rem;">다솜 안경 명예의 전당</div>
    ${profitRows.length>0?podium(profitRows,'투자의 신'):''}
    ${isTeacher?`<div style="margin-top:.55rem;display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;">
      <button onclick="resetRanking()" class="btn bsm" style="background:rgba(255,255,255,.2);color:white;font-size:.72rem;padding:.28rem .7rem;">🔄 랭킹 초기화 (이모지 제외)</button>
    </div>
    <div style="color:rgba(255,255,255,.5);font-size:.68rem;margin-top:.3rem;">${resetStr}</div>`:''}
  </div>`;

  h+=rankSection('profit','투자의 신','💰','#0e9f6e',profitRows,
    r=>`${r.tpnl>=0?'+':''}${fE2(r.tpnl)}`,
    r=>`수익률 ${r.tpnl>=0?'+':''}${r.tpct.toFixed(1)}% | 원금 ${fE(r.inv)}`,
    '아직 투자한 학생이 없습니다.',rankShowMore.profit);

  h+=rankSection('pct','수익률의 신','📈','#1d4ed8',pctRows,
    r=>`${r.tpct>=0?'+':''}${r.tpct.toFixed(1)}%`,
    r=>`수익금 ${r.tpnl>=0?'+':''}${fE2(r.tpnl)} | 원금 ${fE(r.inv)}`,
    '아직 투자한 학생이 없습니다.',rankShowMore.pct);

  // 기부 탭 토글 (월간/연간)
  const donTab=rankShowMore.donTab||'month';
  const donRows=donTab==='month'?donMonthRows:donYearRows;
  const donTitle=donTab==='month'?'월간 기부왕':'기부의 신';
  const donEmoji=donTab==='month'?'🎗️':'🌳';
  const donColor=donTab==='month'?'#059669':'#047857';
  const donEmptyMsg=donTab==='month'?'이번 달 기부한 학생이 없습니다.':'올해 기부한 학생이 없습니다.';
  const donSubFn=donTab==='month'
    ?r=>`이번 달 기부 ${fE2(r.donMonthly)}`
    :r=>`올해 누적 기부 ${fE2(r.donYearly)}`;
  const donValFn=donTab==='month'?r=>fE2(r.donMonthly):r=>fE2(r.donYearly);

  // 기부 섹션 (탭 토글 포함)
  const donDisplay=rankShowMore.don?15:5;
  let donH=`<div style="background:var(--card);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:.85rem;overflow:hidden;">
    <div style="padding:.75rem 1rem .4rem;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:.5rem;">
      <span style="font-size:1.4rem;">${donEmoji}</span>

      ${donRows.length>5?`<button onclick="toggleRankMore('don')" class="btn bs bsm" style="font-size:.68rem;padding:.2rem .5rem;">${rankShowMore.don?'접기':'15위까지 보기'}</button>`:''}
    </div>
    <div style="display:flex;border-bottom:1px solid var(--g100);">
      <button onclick="window._setDonTab('month')" style="flex:1;padding:.4rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:${donTab==='month'?'var(--primary)':'var(--g50)'};color:${donTab==='month'?'white':'var(--g500)'};">🌙 월간 기부왕</button>
      <button onclick="window._setDonTab('year')" style="flex:1;padding:.4rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;background:${donTab==='year'?'var(--primary)':'var(--g50)'};color:${donTab==='year'?'white':'var(--g500)'};">🌳 기부의 신</button>

  if(!donRows.length){

  } else {
    const getDonRank=(arr,idx)=>{
      if(idx===0) return 1;
      const cur=donValFn(arr[idx]), prev=donValFn(arr[idx-1]);
      return cur===prev ? getDonRank(arr,idx-1) : idx+1;
    };
    donRows.slice(0,donDisplay).forEach((r,i)=>{
      const rk=getDonRank(donRows,i);
      const medal=rk===1?'🥇':rk===2?'🥈':rk===3?'🥉':`${rk}`;

        <div style="min-width:1.6rem;text-align:center;font-size:${rk<=3?'1.1':'0.82'}rem;font-weight:700;">${medal}</div>

          <div style="font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${stuEmoji(r.name)} ${r.name}</div>
          <div style="font-size:.72rem;color:var(--g500);margin-top:.05rem;">${donSubFn(r)}</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:${donColor};white-space:nowrap;">${donValFn(r)}</div>
      </div>`;
    });
    const myIdx=donRows.findIndex(r=>isMine(r));
    if(!isTeacher&&myIdx>=donDisplay){
      const r=donRows[myIdx];
      const myRk=getDonRank(donRows,myIdx);
      donH+=`<div style="display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;
        background:var(--pl);border-left:3px solid ${donColor};border-top:2px dashed var(--g200);">
        <div style="min-width:1.6rem;text-align:center;font-size:.82rem;font-weight:700;">${myRk}</div>
        <div style="flex:1;">
          <div style="font-weight:600;font-size:.85rem;">${stuEmoji(r.name)} ${r.name} <span style="font-size:.7rem;color:var(--g500);">(내 순위)</span></div>
          <div style="font-size:.72rem;color:var(--g500);">${donSubFn(r)}</div>
        </div>
        <div style="font-size:.85rem;font-weight:700;color:${donColor};white-space:nowrap;">${donValFn(r)}</div>
      </div>`;
    }
  }
  donH+=`</div>`;
  h+=donH;

  h+=rankSection('emoji','이모지 마스터','🎨','#7c3aed',emojiRows,
    r=>`${r.iconCount}개`,

    '아직 이모지를 구매한 학생이 없습니다.',rankShowMore.emoji);

  h+=rankSection('dep','저축의 신','🏦','#b45309',depRows,
    r=>fE(r.depTotal),
    r=>`예금 중 ${fE(r.depTotal)}`,
    '아직 예금한 학생이 없습니다.',rankShowMore.dep);

  el.innerHTML=h;
}

  if(!state) return;
  const now=kst();
  const lastDay=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  if(now.getDate()===lastDay){
    const todayStr=now.toDateString();
    if(state._lastAutoReset!==todayStr){
      state._lastAutoReset=todayStr;
      state.rankResetDate=now.toISOString();
