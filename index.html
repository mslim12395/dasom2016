// board 저장 헬퍼 — 전체 배열 set() 대신 변경된 글만 update()
function saveBoardPost(post){
  if(!post||!post.id) return;
  const ts=Date.now()+'';
  state._boardTs=ts;
  update(ref(db,ROOT+'/board/'+post.id), post).catch(()=>{});
  update(ref(db,ROOT),{_boardTs:ts}).catch(()=>{});
}
function deleteBoardPost(pid){
  const ts=Date.now()+'';
  state._boardTs=ts;
  set(ref(db,ROOT+'/board/'+pid), null).catch(()=>{});
  update(ref(db,ROOT),{_boardTs:ts}).catch(()=>{});
}

function showBoardWrite(){
  const left=3-todayPostCount(cu.name);
  if(left<=0){showToast('오늘 작성 가능한 글 수(3개)를 초과했습니다.');return;}
  openModal('글쓰기',`
    <div class="fg"><label>제목</label><input type="text" id="bTitle" placeholder="제목 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.9rem;font-family:inherit;"/></div>
    <div class="fg"><label>내용</label><textarea id="bContent" rows="4" placeholder="내용 입력" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.88rem;font-family:inherit;resize:vertical;"></textarea></div>
    <div class="txs tg">오늘 남은 글 수: ${left}개</div>
  `,[
    {l:'등록',c:'bp',f:async()=>{
      const title=document.getElementById('bTitle').value.trim();
      const content=document.getElementById('bContent').value.trim();
      if(!title||!content){showToast('제목과 내용을 입력해주세요.');return;}
      if(!state.board) state.board=[];
      const post={id:'p'+Date.now(),title,content,author:cu.name,date:dStr(),comments:[]};
      state.board.unshift(post);
      saveBoardPost(post);
      showToast('게시글이 등록되었습니다!');closeModal();
      boardView=null;rBoard(document.getElementById('tab-board'));
    }},
    {l:'취소',c:'bs',f:closeModal}
  ]);
}

function addComment(pid){
  const txt=document.getElementById('commentInput').value.trim();
  if(!txt){showToast('댓글 내용을 입력해주세요.');return;}
  if(todayCommentCount(cu.name)>=10){showToast('오늘 댓글 한도(10개)를 초과했습니다.');return;}
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post) return;
  if(!post.comments) post.comments=[];
  post.comments.push({text:txt,author:cu.name,date:dStr(),ts:new Date().toISOString()});
  saveBoardPost(post);switchTab('board');
}

function editPost(pid){
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post||post.author!==cu.name){showToast('수정 권한이 없습니다.');return;}
  openModal('✏️ 게시글 수정',`
    <div class="fg"><label>제목</label><input type="text" id="editBTitle" value="${escHtml(post.title)}" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.9rem;font-family:inherit;background:var(--card);color:var(--g900);"/></div>
    <div class="fg"><label>내용</label><textarea id="editBContent" rows="4" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.88rem;font-family:inherit;resize:vertical;background:var(--card);color:var(--g900);">${escHtml(post.content)}</textarea></div>
  `,[
    {l:'저장',c:'bp',f:()=>{
      const t=document.getElementById('editBTitle').value.trim();
      const c=document.getElementById('editBContent').value.trim();
      if(!t||!c){showToast('제목과 내용을 입력해주세요.');return;}
      post.title=t;post.content=c;post.edited=true;
      saveBoardPost(post);closeModal();showToast('게시글이 수정됐어요!');
      boardView=pid;switchTab('board');
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function toggleLike(pid){
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post) return;
  if(!post.likes) post.likes=[];
  const idx=post.likes.indexOf(cu.name);
  if(idx>=0) post.likes.splice(idx,1);
  else post.likes.push(cu.name);
  saveBoardPost(post);switchTab('board');
}

function deletePost(pid){
  openModal('게시글 삭제',`<p class="tsm">이 게시글을 삭제합니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      state.board=(state.board||[]).filter(p=>p.id!==pid);
      deleteBoardPost(pid);closeModal();boardView=null;switchTab('board');
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function deleteComment(pid,idx){
  const post=(state.board||[]).find(p=>p.id===pid);
  if(!post) return;
  post.comments.splice(idx,1);
  saveBoardPost(post);switchTab('board');
}

function zoomImg(e,hid,type,name){
  if(e&&e.stopPropagation) e.stopPropagation();
  const hw=(state.homework||[]).find(a=>a.id===hid);
  if(!hw) return;
  let src='',title='';

  else{const sub=(hw.submissions||{})[name];if(!sub)return;src=sub.image;title=`${name}의 제출물`;}
  if(!src) return;
  // 풀스크린 오버레이
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;cursor:pointer;';
  overlay.innerHTML=`
    <div style="color:white;font-size:.88rem;font-weight:600;margin-bottom:.6rem;text-align:center;">${escHtml(title)}</div>
    <img src="${src}" style="max-width:95vw;max-height:85vh;object-fit:contain;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);"/>
    <div style="color:rgba(255,255,255,.6);font-size:.75rem;margin-top:.7rem;">탭하면 닫힘</div>`;
  overlay.onclick=()=>overlay.remove();
  document.body.appendChild(overlay);
}

// donationLog는 탭 진입 시 1회 get()으로 로드 (실시간 구독 X)
let _donLogLoaded=false;
function rDonation(el){
  // donationLog 로드 여부와 관계없이 나무/총액은 항상 즉시 렌더
  // donationLog만 lazy load
  if(!_donLogLoaded && !state.donationLog){
    // 나무 UI를 먼저 그리고 아래에 로딩 표시
    _renderDonationTree(el);
    // donationLog 비동기 로드
    get(ref(db,ROOT+'/donationLog')).then(snap=>{
      _donLogLoaded=true;
      if(snap.exists()){
        const raw=snap.val();
        // ts 키 객체 또는 배열 모두 처리
        state.donationLog=Array.isArray(raw)?raw:Object.values(raw);
        state.donationLog=state.donationLog.filter(d=>d&&d.name);
        state.donationLog.sort((a,b)=>(b.ts||'').localeCompare(a.ts||''));
        if(state.donationLog.length>500) state.donationLog=state.donationLog.slice(0,500);
      } else {
        state.donationLog=[];
      }
      rDonation(el); // 데이터 로드 후 전체 재렌더
    }).catch(()=>{ state.donationLog=[]; rDonation(el); });
    return;
  }
  _donLogLoaded=true;
  _renderDonationTree(el);
}

function _renderDonationTree(el){
  const goals=(state.donationGoals||[]).slice().sort((a,b)=>a.amount-b.amount);
  const total=state.totalDonation||0;
  const maxGoal=goals.length>0?goals[goals.length-1].amount:2000;
  const pct=Math.min(100,(total/maxGoal)*100);

  // 나무 성장 단계 계산
  function treeStage(pct){
    if(pct<5)  return{emoji:'🌱',label:'씨앗',color:'#84cc16'};
    if(pct<20) return{emoji:'🌿',label:'새싹',color:'#22c55e'};
    if(pct<40) return{emoji:'🌳',label:'작은 나무',color:'#16a34a'};
    if(pct<65) return{emoji:'🌲',label:'큰 나무',color:'#15803d'};
    if(pct<85) return{emoji:'🌸',label:'꽃 피는 나무',color:'#ec4899'};
    return{emoji:'✨🌟🌳🌟✨',label:'황금 나무',color:'#d97706'};
  }
  const stage=treeStage(pct);
  const isTeacher=cu.type==='teacher';
  const st=state.students[cu.name];
  const myBal=isTeacher?0:(st?.bal||0);

  let h=`
  <!-- 나무 UI -->
  <div style="background:linear-gradient(180deg,var(--pl) 0%,var(--sl) 60%,var(--sl) 100%);border-radius:var(--r);padding:1.5rem 1.2rem;text-align:center;box-shadow:var(--sh);margin-bottom:.9rem;">
    <div id="donationTree" style="font-size:4.5rem;margin-bottom:.4rem;transition:all .5s;">${stage.emoji}</div>
    <div style="font-weight:700;font-size:1rem;color:${stage.color};margin-bottom:.25rem;">${stage.label}</div>
    <div style="font-size:.82rem;color:var(--g700);margin-bottom:1rem;">우리 반 나무 · 누적 기부 <strong style="color:${stage.color};">${fE2(total)}</strong></div>
    <!-- 프로그레스 바 -->
    <div style="background:var(--g200);border-radius:999px;height:18px;overflow:hidden;margin-bottom:.5rem;position:relative;">
      <div style="width:${pct}%;height:100%;background:linear-gradient(90deg,var(--suc),${stage.color});border-radius:999px;transition:width .8s;min-width:${pct>0?'4px':'0'};"></div>
    </div>
    <div style="font-size:.75rem;color:var(--g500);">${pct.toFixed(1)}% 달성</div>
  </div>

  <!-- 목표/보상 목록 -->
  <div class="card"><div class="ct">🎁 기부 보상 목록</div>`;

  goals.forEach(g=>{
    const unlocked=total>=g.amount;
    const gPct=Math.min(100,(total/g.amount)*100);
    h+=`<div style="display:flex;align-items:center;gap:.75rem;padding:.6rem 0;border-bottom:1px solid var(--g200);">
      <div style="font-size:1.6rem;opacity:${unlocked?1:.35};">🎁</div>
      <div style="flex:1;">
        <div style="font-size:.88rem;font-weight:600;color:${unlocked?'var(--suc)':'var(--g700)'};">${g.reward}</div>
        <div style="font-size:.72rem;color:var(--g500);margin-top:.1rem;">목표: ${fE2(g.amount)}</div>
        <div style="background:var(--g200);border-radius:999px;height:6px;margin-top:.3rem;overflow:hidden;">
          <div style="width:${gPct}%;height:100%;background:${unlocked?'var(--suc)':'var(--primary)'};border-radius:999px;"></div>
        </div>
      </div>
      <div style="font-size:.85rem;font-weight:700;color:${unlocked?'var(--suc)':'var(--g500)'};">${unlocked?'✅ 해금':'🔒'}</div>
    </div>`;
  });
  h+=`</div>`;

  // 기부하기 (학생만)
  if(!isTeacher){
    h+=`<div class="card"><div class="ct">💚 기부하기</div>
    <p class="tsm tg" style="margin-bottom:.65rem;">내 조개를 반 나무에 기부해요. 기부금은 반환되지 않습니다.</p>
    <p class="tsm" style="margin-bottom:.6rem;">내 투자 가능 금액: <strong class="tp">${fE2(myBal)}</strong></p>
    <div style="display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:.5rem;">
      ${[10,50,100,500].map(a=>`<button class="btn bs bsm" onclick="donateAmount(${a})" ${myBal<a?'disabled':''}>+${a}조개</button>`).join('')}
    </div>
    <div style="display:flex;gap:.45rem;align-items:flex-end;">
      <div class="fg" style="flex:1;margin-bottom:0;"><label>직접 입력 (1조개 단위)</label>
        <input type="number" id="donateInput" min="1" step="1" placeholder="예: 30" style="width:100%;padding:.55rem .75rem;border:1.5px solid var(--g200);border-radius:10px;font-size:.92rem;font-family:inherit;"/>
      </div>
      <button class="btn bsuc bsm" onclick="donateCustom()">기부</button>
    </div></div>`;
  }

  // 기부 기록 — 로드된 경우만 표시, 아니면 버튼
  const donLog=(state.donationLog||[]);
  if(!_donLogLoaded){
    h+=`<div class="card" style="text-align:center;">

    </div>`;
  } else if(donLog.length>0){
    const showAllDon=!!(state._showAllDonLog);

    displayLog.forEach(d=>{

    if(!showAllDon&&donLog.length>10){
      h+=`<div style="text-align:center;padding:.45rem 0;font-size:.75rem;color:var(--g500);">... 외 ${donLog.length-10}건</div>`;
    }
    h+=`</div>`;
  } else {
    h+=`<div class="card"><div class="empty">아직 기부 내역이 없습니다.</div></div>`;
  }
  el.innerHTML=h;
}

let patrolFormState={score:1,content:'',date:''}; // 폼 상태 유지
// ══════════════════════════════════════════════

// 두루마리 간단 암호화 (학생 이름 보호 — 교사가 수동 해독 불가, 서버에서만 복호화)
function _smEnc(name){
  const k='daize_smg_2025';
  let r='';
  for(let i=0;i<name.length;i++) r+=String.fromCharCode(name.charCodeAt(i)^k.charCodeAt(i%k.length));
  return btoa(unescape(encodeURIComponent(r)));
}
function _smDec(enc){
  try{
    const k='daize_smg_2025';
    const r=decodeURIComponent(escape(atob(enc)));
    let o='';
    for(let i=0;i<r.length;i++) o+=String.fromCharCode(r.charCodeAt(i)^k.charCodeAt(i%k.length));
    return o;
  }catch(e){return '?';}
}

// 이번 달 두루마리 자동 지급 체크 — 매월 3장으로 리셋, 최대 3장
function checkShinmungoScrolls(){
  const now=kst();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const st=state.students[cu.name];
  if(!st) return;
  if(!st.scrollMonth||st.scrollMonth!==ym){
    // 새 달 — 무조건 3장으로 리셋 (누적 없음, 최대 3장)
    const newCount=3;
    st.scrollCoupons=newCount;
    st.scrollMonth=ym;
    update(ref(db,ROOT+'/students/'+cu.name),{scrollCoupons:newCount,scrollMonth:ym}).catch(()=>{});
    showToast(`📜 이번 달 두루마리 3장이 지급됐습니다!`);
  }
  // 혹시라도 3장 초과면 3장으로 강제 제한
  if((st.scrollCoupons||0)>3){
    st.scrollCoupons=3;
    update(ref(db,ROOT+'/students/'+cu.name),{scrollCoupons:3}).catch(()=>{});
  }
}

let _smgLoaded=false;
let _smgPosts=[];
let _smgWriting=false;

// 신문고 정지 여부 확인
function isSmgBanned(name){
  const st=state.students?.[name];
  if(!st?.smgBanUntil) return false;
  return new Date(st.smgBanUntil)>kst();
}
function smgBanUntilStr(name){
  const st=state.students?.[name];
  if(!st?.smgBanUntil) return '';
  const d=new Date(st.smgBanUntil);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// ── 신문고 전역 함수
let _smgSelectedCat='concern';

window.smgSelectCat=function(cat){
  _smgSelectedCat=cat;
  ['concern','report','suggest','etc'].forEach(c=>{
    const btn=document.getElementById('smgCat-'+c);
    if(!btn) return;
    const colors={concern:['#3b82f6','#dbeafe'],report:['#ef4444','#fee2e2'],suggest:['#10b981','#d1fae5'],etc:['var(--g400)','var(--g100)']};
    btn.style.borderColor=c===cat?colors[c][0]:'var(--g200)';
    btn.style.background=c===cat?colors[c][1]:'var(--g50)';
  });
};

window.smgOpenWrite=function(){
  _smgWriting=true;
  _smgSelectedCat='concern';
  const el=document.getElementById('tab-shinmungo');
  if(el) rShinmungo(el);
};
window.smgCancelWrite=function(){
  _smgWriting=false;
  const el=document.getElementById('tab-shinmungo');
  if(el) rShinmungo(el);
};

window.smgSubmit=async function(){
  const st=state.students[cu.name];
  if(isSmgBanned(cu.name)){showToast('🚫 신문고 사용이 정지된 상태입니다.');return;}
  if((st?.scrollCoupons||0)<=0){showToast('두루마리가 없습니다. 다음 달에 지급됩니다.');return;}
  const title=document.getElementById('smgTitle')?.value.trim();
  const content=document.getElementById('smgContent')?.value.trim();
  if(!title){showToast('제목을 입력해주세요.');return;}
  if(content.length<5){showToast('내용을 5자 이상 입력해주세요.');return;}

  const now=new Date();
  const id='smg'+now.getTime();
  const post={
    id,
    category:_smgSelectedCat,
    title,
    content,
    _enc:_smEnc(cu.name), // 항상 이름 암호화 저장
    date:dStr(),
    ts:now.toISOString(),
    read:false,
    reply:null,
  };

  // 두루마리 1장 차감
  st.scrollCoupons=Math.max(0,(st.scrollCoupons||1)-1);
  update(ref(db,ROOT+'/students/'+cu.name),{scrollCoupons:st.scrollCoupons}).catch(()=>{});

  // 신문고 저장
  await update(ref(db,ROOT+'/shinmungo/'+id),post).catch(()=>{});

  // 로컬 업데이트
  _smgPosts.unshift(post);
  _smgWriting=false;

  // 완료 모달 — 두루마리 봉인 연출
  openModal('📜 전송 완료',`
    <div style="text-align:center;padding:1rem 0;">
      <div style="font-size:3.5rem;margin-bottom:.5rem;">🔏</div>
      <div style="font-size:1rem;font-weight:700;color:var(--g800);margin-bottom:.4rem;">두루마리가 봉인됐습니다!</div>
      <div style="font-size:.82rem;color:var(--g600);line-height:1.6;">선생님께 안전하게 전달됐습니다.<br/>비밀은 철저히 보장됩니다.<br/><span style="color:var(--warn);">잔여 두루마리: ${st.scrollCoupons}장</span></div>
    </div>
  `,[{l:'확인',c:'bp',f:()=>{closeModal();rShinmungo(document.getElementById('tab-shinmungo'));}}]);
};

function addPatrolLog(){
  const checked=[...patrolChecked];
  const content=patrolFormState.content.trim();
  const score=patrolFormState.score;
  const dateInput=patrolFormState.date;
  if(!checked.length){showToast('대상 학생을 1명 이상 선택해주세요.');return;}
  if(!content){showToast('내용을 입력해주세요.');return;}
  const now=kst();
  const date=dateInput||`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  if(!state.patrolLog) state.patrolLog=[];
  else if(!Array.isArray(state.patrolLog)) state.patrolLog=Object.values(state.patrolLog);
  checked.forEach((target,i)=>{
    const entry={target,content,score,date,by:cu.name,ts:new Date().toISOString()+'_'+i};
    state.patrolLog.unshift(entry);
    // 항목별 저장 (ts를 키로 사용, 특수문자 제거)
    const key=entry.ts.replace(/[^0-9a-zA-Z_]/g,'_');
    update(ref(db,ROOT+'/patrolLog/'+key), entry).catch(()=>{});
  });
  state.patrolLog.sort((a,b)=>b.date.localeCompare(a.date));
  _patrolLoaded=true;
  const pTs=Date.now()+''; state._patrolTs=pTs;
  update(ref(db,ROOT),{_patrolTs:pTs}).catch(()=>{});
  patrolChecked.clear();
  patrolFormState.score=1;patrolFormState.content='';patrolFormState.date='';
  showToast(`${checked.length}명 순찰일지 등록 완료!`);
  rPatrol(document.getElementById('tab-patrol'));
}

function deletePatrolLog(idx){
  const filtered=getPatrolFiltered();
  const item=filtered[idx];
  if(!item) return;
  const realIdx=state.patrolLog.findIndex(l=>l.ts===item.ts);
  if(realIdx===-1) return;
  openModal('삭제 확인',`<p class="tsm"><strong>${item.target}</strong> - ${item.content} 기록을 삭제합니다.</p>`,[
    {l:'삭제',c:'bdan',f:()=>{
      const key=item.ts.replace(/[^0-9a-zA-Z_]/g,'_');
      state.patrolLog.splice(realIdx,1);
      set(ref(db,ROOT+'/patrolLog/'+key),null).catch(()=>{});
      closeModal();rPatrol(document.getElementById('tab-patrol'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function getPatrolFiltered(){
  return (state.patrolLog||[]).filter(l=>{
    const [y,m]=l.date.split('-');
    if(patrolFilter.year&&y!==patrolFilter.year) return false;
    if(patrolFilter.month&&m!==patrolFilter.month) return false;
    if(patrolFilter.student&&l.target!==patrolFilter.student) return false;
    return true;
  });
}

function setPatrolFilter(key,val){
  patrolFilter[key]=val;
  const el=document.getElementById('tab-patrol');
  if(el&&el.classList.contains('active')) rPatrol(el);
}

// ── IMAGE RESIZE HELPER (Firebase 용량 절약)
// ── SOUND EFFECTS (Web Audio API)
function playSound(type){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(type==='buy'){
      o.frequency.setValueAtTime(440,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='sell'){
      o.frequency.setValueAtTime(880,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,ctx.currentTime+0.15);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      o.start();o.stop(ctx.currentTime+0.3);
    } else if(type==='deposit'){
      // 동전 소리 느낌
      o.frequency.setValueAtTime(1200,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(600,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.2,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.2);
      o.start();o.stop(ctx.currentTime+0.2);
    } else if(type==='win'){
      // 복권 당첨 팡파레 — 4음 상승 (기본 오실레이터 사용 안 함)
      g.gain.setValueAtTime(0,ctx.currentTime); // 기본 오실레이터 음소거
      o.start();o.stop(ctx.currentTime+0.01);
      const freqs=[523,659,784,1047];
      freqs.forEach((f,i)=>{
        const o2=ctx.createOscillator(),g2=ctx.createGain();
        o2.connect(g2);g2.connect(ctx.destination);
        o2.frequency.setValueAtTime(f,ctx.currentTime+i*0.13);
        g2.gain.setValueAtTime(0.35,ctx.currentTime+i*0.13);
        g2.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.13+0.28);
        o2.start(ctx.currentTime+i*0.13);
        o2.stop(ctx.currentTime+i*0.13+0.28);
      });
    }
  }catch(e){}
}
function addTxLog(type,name,amt,by,note){
  const entry={id:Date.now(),type,name,amt,by,note:note||'',date:dStr(),ts:new Date().toISOString()};
  // 공유 txLog (메모리)
  if(!state.txLog) state.txLog=[];

  if(state.txLog.length>500) state.txLog=state.txLog.slice(0,500);
  // 학생별 txLog (메모리 + Firebase 저장)
  if(name && state.students?.[name]){
    if(!Array.isArray(state.students[name].txLog)) state.students[name].txLog=[];
    state.students[name].txLog.unshift(entry);
    if(state.students[name].txLog.length>50) state.students[name].txLog=state.students[name].txLog.slice(0,50);
  }
  saveTxLogDebounced(name);
}

function cashierBulkDeposit(){
  const amt=parseFloat(document.getElementById('csBulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  openModal('일괄 입금 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게 1인당 <strong>${fE(amt)}</strong>를 입금합니다.</p>`,[
    {l:'입금',c:'bsuc',f:async()=>{
      const updates={};
      let cnt=0;
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return;
        const newBal=parseFloat(((st.bal||0)+amt).toFixed(2));
        const newDep0=parseFloat((((st.dep0||0)+amt)).toFixed(2));
        ensureReturnFields(st);
        const newFlow=parseFloat((((st.returnCapitalFlow||0)+amt)).toFixed(2));
        st.bal=newBal; st.dep0=newDep0; st.returnCapitalFlow=newFlow;
        updates[`students/${s.name}/bal`]=newBal;
        updates[`students/${s.name}/dep0`]=newDep0;
        updates[`students/${s.name}/returnCapitalFlow`]=newFlow;
        addTxLog('deposit',s.name,amt,cu.name,'일괄 입금(은행장)');
        cnt++;
      });
      if(cnt===0){showToast('처리할 학생이 없습니다.');closeModal();return;}
      update(ref(db,ROOT),updates).catch(()=>{});
      showToast(`${cnt}명에게 일괄 입금 완료!`);closeModal();
      rCashier(document.getElementById('tab-cashier'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function cashierBulkWithdraw(){
  const raw=parseFloat(document.getElementById('csBulkAmt').value);
  if(!raw||raw<=0){showToast('금액을 입력해주세요.');return;}
  const amt=Math.round(raw);
  openModal('일괄 회수 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게서 1인당 <strong>${fE(amt)}</strong>를 회수합니다.</p>`,[
    {l:'회수',c:'bdan',f:async()=>{
      const updates={};
      let cnt=0,skip=0;
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        const st=state.students[s.name];
        if(!st||(st.dep0||0)===0) return;
        if((st.bal||0)<amt){skip++;return;}
        const newBal=parseFloat(((st.bal||0)-amt).toFixed(2));
        const newDep0=parseFloat((Math.max(0,(st.dep0||0)-amt)).toFixed(2));
        ensureReturnFields(st);
        const newFlow=parseFloat((((st.returnCapitalFlow||0)-amt)).toFixed(2));
        st.bal=newBal; st.dep0=newDep0; st.returnCapitalFlow=newFlow;
        updates[`students/${s.name}/bal`]=newBal;
        updates[`students/${s.name}/dep0`]=newDep0;
        updates[`students/${s.name}/returnCapitalFlow`]=newFlow;
        addTxLog('withdraw',s.name,amt,cu.name,'일괄 회수(은행장)');
        cnt++;
      });
      if(cnt===0){showToast(skip>0?'회수 가능한 학생이 없습니다.':'처리할 학생이 없습니다.');closeModal();return;}
      update(ref(db,ROOT),updates).catch(()=>{});
      showToast(`${cnt}명 회수 완료${skip>0?` (잔액부족 ${skip}명 제외)`:''}`);closeModal();
      rCashier(document.getElementById('tab-cashier'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}

function calcExpectedBal(name){
  const st=state.students[name];
  if(!st) return null;
  const txLog=state.txLog||[];
  const myTx=txLog.filter(t=>t.name===name);
  if(myTx.length===0) return null; // txLog 없으면 검증 불가
  
  // txLog를 시간순 재생하여 bal 재구성
  // 정렬: 오래된 것부터
  const sorted=[...myTx].sort((a,b)=>(a.ts||'').localeCompare(b.ts||''));
  let bal=0;
  sorted.forEach(t=>{
    const note=t.note||'';
    const isStockBuy=note.includes('\ub9e4\uc218')||note.includes('매수');
    const isStockSell=note.includes('\ub9e4\ub3c4')||note.includes('매도');
    
    if(isStockBuy){
      // 주식 매수: bal에서 비용 빠짐
      bal-=t.amt;
    } else if(isStockSell){
      // 주식 매도: bal에 수익 들어옴
      bal+=t.amt;
    } else if(t.type==='deposit'){
      bal+=t.amt;
    } else if(t.type==='withdraw'){
      bal-=t.amt;
    }
  });
  
  // 이모지 구매 차감
  const iconSpent=st.iconSpent||0;
  bal-=iconSpent;
  
  // 기부금 차감 (iconSpent에 이미 포함된 경우가 있으므로, donationLog에서 별도 차감 안 함)
  // iconSpent = 이모지 구매 + 기부이므로 이미 반영됨
  
  // 진행 중 예금 원금 차감
  const activeDeps=(st.deps||[]).filter(d=>!d.done&&!d.er);
  activeDeps.forEach(d=>{ bal-=d.amt; });
  
  // 만기 예금 이자 추가 (원금은 이미 deposit으로 들어왔고, 이자만 추가)
  const doneDeps=(st.deps||[]).filter(d=>d.done&&!d.er);
  doneDeps.forEach(d=>{
    if(d.ret&&d.amt){
      bal+=(d.ret-d.amt); // 이자-세금
    }
  });
  
  // 복권 당첨 추가
  if(state.lotteryWon){
    Object.entries(state.lotteryWon).forEach(([emoji,winner])=>{
      if(winner===name) bal+=100;
    });
  }
  
  return parseFloat(bal.toFixed(2));
}

    const expected=calcExpectedBal(s.name);
    if(expected===null) return;
    const actual=parseFloat((st.bal||0).toFixed(2));
    const diff=parseFloat((expected-actual).toFixed(2));
    if(Math.abs(diff)>=0.5){
      st.bal=expected;
      update(ref(db,ROOT+'/students/'+s.name),{bal:expected}).catch(()=>{});
      addTxLog(diff>0?'deposit':'withdraw',s.name,Math.abs(diff),cu.name,'\uc794\uc561 \uc790\ub3d9 \ubcf5\uad6c');
      fixed++;
    }
  });
  if(fixed>0){
    showToast(`✅ ${fixed}명 잔액 복구 완료!`);
    closeModal();verifyBalances();
  } else {
    showToast('복구할 학생이 없습니다.');
  }
}

function showStudentDetail(name){

  const pos=p.tpnl>=0;

  let body=`
  <div style="text-align:center;margin-bottom:.75rem;">
    <div style="font-size:3rem;">${emoji}</div>
    <div style="font-weight:700;font-size:1.05rem;">${name} ${hasPw}</div>
  </div>

    <div style="background:var(--g50);border-radius:8px;padding:.5rem;text-align:center;">
      <div class="txs tg">총 자산</div><div class="tsm fb tp">${fE(p.total)}</div>
    </div>
    <div style="background:var(--g50);border-radius:8px;padding:.5rem;text-align:center;">
      <div class="txs tg">투자 가능</div><div class="tsm fb">${fE2(st.bal)}</div>
    </div>
    <div style="background:${pos?'var(--sl)':'var(--dl)'};border-radius:8px;padding:.5rem;text-align:center;">
      <div class="txs tg">총 손익</div><div class="tsm fb ${pos?'tsuc':'tdan'}">${pos?'+':''}${fE2(p.tpnl)}</div>
    </div>
    <div style="background:${pos?'var(--sl)':'var(--dl)'};border-radius:8px;padding:.5rem;text-align:center;">
      <div class="txs tg">수익률</div><div class="tsm fb ${pos?'tsuc':'tdan'}">${pos?'+':''}${p.tpct.toFixed(1)}%</div>
    </div>
  </div>`;

  // 보유 주식
  const holdings=STOCKS.filter(s=>(st.hld[s.id]||0)>0);
  if(holdings.length){
    body+=`<div style="font-weight:600;font-size:.82rem;margin-bottom:.35rem;color:var(--g700);">📊 보유 주식</div>`;
    holdings.forEach(s=>{
      const q=st.hld[s.id],cp=state.stocks[s.id].price,ac=st.cb[s.id]||0;
      const pnl=(cp-ac)*q;
      body+=`<div style="display:flex;justify-content:space-between;padding:.3rem 0;border-bottom:1px solid var(--g200);font-size:.78rem;">
        <span>${s.emoji} ${s.name.replace('DA ','')} ${q}주</span>
        <span class="${pnl>=0?'tsuc':'tdan'} fb">${pnl>=0?'+':''}${fE2(pnl)}</span>
      </div>`;
    });
  }

  // 예금
  if(adeps.length){
    body+=`<div style="font-weight:600;font-size:.82rem;margin:.55rem 0 .35rem;color:var(--g700);">🏦 예금 ${adeps.length}건</div>`;
    adeps.forEach(d=>{
      body+=`<div style="font-size:.75rem;padding:.25rem 0;border-bottom:1px solid var(--g200);">${d.mon}개월 · ${fE(d.amt)} · D-${daysLeft(d.md)}</div>`;
    });
  }

  // 순찰 요약
  if(myPatrol.length){
    body+=`<div style="font-weight:600;font-size:.82rem;margin:.55rem 0 .35rem;color:var(--g700);">🚔 순찰 기록 (합산: <span class="${patrolScore>=0?'tsuc':'tdan'}">${patrolScore>=0?'+':''}${patrolScore}</span>)</div>`;

    <div style="display:flex;flex-wrap:wrap;gap:.35rem;">
      ${icons.map(e=>{
        const refundAmt=emojiPrice(e);
        const isCurrent=st.customEmoji===e;
        return `<div onclick="window.teacherRefundEmoji('${name}','${e}')"
          style="display:flex;flex-direction:column;align-items:center;padding:.4rem .55rem;
          border-radius:10px;border:2px solid ${isCurrent?'var(--primary)':'var(--g200)'};
          background:${isCurrent?'var(--pl)':'var(--g50)'};cursor:pointer;min-width:48px;
          transition:all .15s;-webkit-tap-highlight-color:transparent;" title="${e} · ${refundAmt}조개 환불">
          <span style="font-size:1.8rem;line-height:1.2;">${e}</span>
          <span style="font-size:.62rem;color:var(--g500);margin-top:.1rem;">${fE(refundAmt)}</span>
          ${isCurrent?`<span style="font-size:.58rem;color:var(--primary);font-weight:700;">사용중</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }

  openModal(`${emoji} ${name} 상세 정보`,body,[{l:'닫기',c:'bs',f:closeModal}]);
}

// 교사: 이모지 회수(환불)
window.teacherRefundEmoji=function(name, emoji){
  const st=state.students[name];
  if(!st){showToast('학생 데이터 없음');return;}
  if(!st.iconMap||!st.iconMap[emoji]){showToast('보유하지 않은 이모지입니다.');return;}
  const refundAmt=emojiPrice(emoji);
  openModal(`🎨 이모지 회수`,`
    <div style="text-align:center;padding:.5rem 0 .8rem;">
      <div style="font-size:3rem;margin-bottom:.3rem;">${emoji}</div>
      <div style="font-weight:700;font-size:.95rem;">${name} · ${emoji} 회수</div>
      <div style="font-size:.82rem;color:var(--g500);margin-top:.2rem;">원래 가격 ${fE(refundAmt)} 환불</div>
    </div>
  `,[
    {l:'회수 & 환불',c:'bdan',f:async()=>{
      // iconMap에서 제거
      delete st.iconMap[emoji];
      st.iconList=Object.keys(st.iconMap).filter(e=>e&&e.trim());
      // 현재 장착 이모지면 기본으로
      if(st.customEmoji===emoji) st.customEmoji=null;
      // 잔액 환불
      st.bal=parseFloat(((st.bal||0)+refundAmt).toFixed(2));
      st.iconSpent=Math.max(0,(st.iconSpent||0)-refundAmt);
      st.returnExpenseExcluded=Math.max(0,(st.returnExpenseExcluded||0)-refundAmt);
      addTxLog('deposit',name,refundAmt,cu.name,`이모지 ${emoji} 회수 환불`);
      await update(ref(db,ROOT+'/students/'+name),{
        iconList:st.iconList, customEmoji:st.customEmoji||null,
        bal:st.bal, iconSpent:st.iconSpent,
        returnExpenseExcluded:st.returnExpenseExcluded
      }).catch(()=>{});
      closeModal();
      showToast(`${emoji} 회수 완료! ${fE(refundAmt)} 환불`);
      // 상세 팝업 재오픈
      setTimeout(()=>showStudentDetail(name),200);
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
};

function rTxHistory(el){
  const st=state.students[cu.name];
  // 학생 자신의 txLog: state에 메모리 캐시된 것 우선, 없으면 state.txLog 필터
  const myTx=(st.txLog||[]).length>0
    ? st.txLog
    : (state.txLog||[]).filter(t=>t.name===cu.name);

  // 주식 보유 현황 카드
  let h=`<div class="card"><div class="ct">📊 보유 주식 현황</div>`;
  let hasTrade=false;
  STOCKS.forEach(s=>{
    const q=st.hld[s.id]||0, ac=st.cb[s.id]||0;
    if(q>0){
      hasTrade=true;
      const val=q*state.stocks[s.id].price;
      const cost=q*ac;
      const pnl=val-cost;
      const pct=cost>0?(pnl/cost*100):0;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:.6rem;border-radius:10px;background:var(--g50);margin-bottom:.4rem;">
        <div style="display:flex;align-items:center;gap:.55rem;">
          <span style="font-size:1.5rem;">${s.emoji}</span>
          <div>
            <div style="font-weight:600;font-size:.88rem;">${s.name}</div>
            <div class="txs tg">${q}주 · 평단 ${fE2(ac)}</div>
          </div>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700;font-size:.9rem;">${fE2(val)}</div>
          <div style="font-size:.78rem;font-weight:600;color:${pnl>=0?'var(--suc)':'var(--dan)'};">${pnl>=0?'▲':'▼'} ${Math.abs(pct).toFixed(1)}% (${pnl>=0?'+':''}${fE2(pnl)})</div>
        </div>
      </div>`;
    }
  });
  if(!hasTrade) h+=`<div class="empty">보유 주식이 없습니다.</div>`;
  h+=`</div>`;

  // 거래 기록 카드
  h+=`<div class="card"><div class="ct">📋 거래 내역 ${myTx.length>0?`<span class="txs tg" style="font-weight:400;">(${myTx.length}건)</span>`:''}</div>`;
  if(!myTx.length){
    h+=`<div class="empty">아직 거래 기록이 없습니다.</div>`;
  } else {
    myTx.slice(0,50).forEach(tx=>{
      const isIn=tx.type==='deposit';
      const note=tx.note||'';
      // 거래 종류 분류
      let icon,label;
      if(note.includes('매수')){icon='📈';label='주식 매수';}
      else if(note.includes('매도')){icon='📉';label='주식 매도';}
      else if(note.includes('이모지')&&note.includes('구매')){icon='🎨';label='이모지 구매';}
      else if(note.includes('이모지')&&note.includes('구입권')){icon='🎟️';label='구입권 사용';}
      else if(note.includes('이모지')&&note.includes('회수')){icon='↩️';label='이모지 회수';}
      else if(note.includes('기부')){icon='💚';label='기부';}
      else if(note.includes('토지')||note.includes('부동산')){icon='🏙️';label='부동산';}
      else if(note.includes('건설')){icon='🏗️';label='건물 건설';}
      else if(note.includes('복권')){icon='🎉';label='복권 당첨';}
      else if(note.includes('예금')||note.includes('적금')){icon='🏦';label='예금';}
      else if(note.includes('P2P')){icon='🤝';label='P2P 거래';}
      else if(note.includes('일괄')){icon='💼';label='일괄 처리';}
      else if(note.includes('수익')||note.includes('일일')){icon='📅';label='일일 수익';}
      else{icon=isIn?'📥':'📤';label=isIn?'입금':'출금';}

      const amtColor=isIn?'var(--suc)':'var(--dan)';
      const amtPrefix=isIn?'+':'−';
      h+=`<div style="display:flex;align-items:center;gap:.65rem;padding:.5rem 0;border-bottom:1px solid var(--g200);">
        <span style="font-size:1.2rem;flex-shrink:0;">${icon}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:.82rem;color:${amtColor};">${label}</div>
          <div class="txs tg" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(note)||tx.date}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div style="font-weight:700;font-size:.85rem;color:${amtColor};">${tx.amt>0?amtPrefix+fE(tx.amt):'−'}</div>
          <div class="txs tg">${tx.date}</div>
        </div>
      </div>`;
    });
    if(myTx.length>50) h+=`<div class="txs tg" style="text-align:center;padding:.5rem;">최근 50건만 표시</div>`;
  }
  h+=`</div>`;
  el.innerHTML=h;
}

// 부동산 시스템 — 한반도 9개 도시
// ════════════════════════════════════════════

// 도시 데이터 (한반도 3×3 배치: 북→남, 서→동)
// 행0: 인천  강원  (강원은 오른쪽위)
// 행1: 서울  세종  대전
// 행2: 광주  대구  부산
// 행3: 제주  (아래)
// 실제 3×3 배치:
// [인천][강원][  ]  → row0: 인천(0,0), 강원(0,1), 빈칸(0,2)
// [서울][세종][대전] → row1: 서울(1,0), 세종(1,1), 대전(1,2)
// [광주][대구][부산] → row2: 광주(2,0), 대구(2,1), 부산(2,2)
// → 제주는 row2의 특별칸으로 처리 (광주 아래) 또는 광주 자리
// 최종 3×3:
// [강원][인천][  빈  ]
// [서울][세종][대전   ]
// [광주][대구][부산   ]
// + 제주는 광주 대신 row2, col0 or 별도 위치
// ── 실제 배치 (한반도 직관적 3×3+1):
// row0: 인천 / 강원 / (빈칸→제주는 하단)
// row1: 서울 / 세종 / 대전
// row2: 광주 / 대구 / 부산
// 제주는 별도 행(row3) col0 — 총 10칸 중 9칸 활용
// 하지만 3×3 = 9칸 정확히 맞추기 위해:
// [강원][인천][  ]    → 인천(0,0) 강원(0,1) 빈칸없음→제주(0,2)
// [서울][세종][대전]
// [광주][대구][부산]
// 그래서 실제로 4행 필요 (제주 별도). 4×3에서 1칸 비워 9칸.
// 간단하게: 3×3 = 9칸에 9개 도시 그냥 넣기 (직관 배치)

// 도시 가격/수익/설명 — state에 저장된 값 우선, 없으면 기본값

// 건물 기본 데이터 (아파트·빌딩·반도체공장)
// 건물 비용/수익 — state 저장 우선 (전체 오버라이드, 도시별 오버라이드 순)
function reBuildingInfo(bk, plotId){
  const base=RE_BUILDINGS[bk];
  if(!base) return null;
  const globalOverride=state.realestate?.settings?.buildings?.[bk];
  const cityOverride=plotId?state.realestate?.settings?.cityBuildings?.[plotId]?.[bk]:null;
  // 도시별 > 전체 > 기본값 순서로 적용
  return {
    name: base.name,
    emoji: base.emoji,
    cost:   cityOverride?.cost   ?? globalOverride?.cost   ?? base.cost,
    income: cityOverride?.income ?? globalOverride?.income ?? base.income,
  };
}

// 즉시 구매 (빈 도시 클릭)
function reQuickBuy(plotId){
  const city=RE_CITY_MAP[plotId];
  if(!city){showToast('알 수 없는 도시입니다.');return;}
  const p=state.realestate?.plots?.[plotId];
  if(p&&p.owner){showToast('이미 소유된 땅입니다.');return;}
  const st=state.students[cu.name];
  const landPrice=reCityPrice(plotId);
  const tax=Math.round(landPrice*0.1);
  const total=landPrice+tax;
  const canAfford=(st?.bal||0)>=total;
  openModal(`${city.emoji} ${city.name}`,`
    <div style="text-align:center;padding:.5rem 0 .8rem;">
      <div style="font-size:3rem;margin-bottom:.3rem;">${city.emoji}</div>
      <div style="font-size:1.1rem;font-weight:700;">${city.name}</div>
      <div style="font-size:.82rem;color:var(--g600);margin:.2rem 0 .6rem;">${reCityDesc(plotId)}</div>
      <div style="background:var(--g50);border-radius:10px;padding:.65rem;display:inline-block;min-width:160px;">
        <div style="font-size:.75rem;color:var(--g500);">구매가</div>
        <div style="font-size:1.3rem;font-weight:700;color:var(--primary);">${fE(landPrice)}</div>
        <div style="font-size:.75rem;color:var(--warn);margin-top:.1rem;">취득세 10%: +${fE(tax)}</div>
        <div style="font-size:.78rem;font-weight:700;color:var(--dan);margin-top:.05rem;">합계: ${fE(total)}</div>
        <div style="font-size:.78rem;color:var(--suc);margin-top:.2rem;">일일 수익 +${reCityIncome(plotId)}조개/일</div>
      </div>
      ${!canAfford?`<div style="margin-top:.65rem;background:var(--dl);border-radius:8px;padding:.45rem .75rem;font-size:.78rem;color:var(--dan);">
        💸 잔액 부족 · 현재 ${fE2(st?.bal||0)} / 필요 ${fE(total)}<br/>
        <span style="font-size:.72rem;color:var(--g500);">앞으로 ${fE(total-(st?.bal||0))} 더 모으면 살 수 있어요!</span>
      </div>`:''}
    </div>
    <div style="margin-top:.1rem;">
      <div style="font-size:.78rem;font-weight:700;color:var(--g700);margin-bottom:.35rem;">🏗️ 건물 건설 미리보기</div>
      <div style="display:flex;gap:.4rem;">
        ${Object.keys(RE_BUILDINGS).map(bk=>{
          const bv=reBuildingInfo(bk, plotId);
          const bTax=Math.round(bv.cost*0.1);
          const bTotal=bv.cost+bTax;
          const canBuild=(st?.bal||0)-(canAfford?total:0)>=bTotal;
          return `<div style="flex:1;background:${canBuild?'var(--sl)':'var(--g50)'};border:1.5px solid ${canBuild?'var(--suc)':'var(--g200)'};border-radius:10px;padding:.5rem .4rem;text-align:center;opacity:${canBuild?1:.55};">
            <div style="font-size:1.5rem;">${bv.emoji}</div>
            <div style="font-size:.7rem;font-weight:700;margin:.15rem 0;">${bv.name}</div>
            <div style="font-size:.65rem;color:var(--g600);">건설비 ${fE(bv.cost)}</div>
            <div style="font-size:.62rem;color:var(--warn);">취득세 +${fE(bTax)}</div>
            <div style="font-size:.68rem;color:var(--suc);font-weight:700;">+${bv.income}조개/일</div>
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:.68rem;color:var(--g500);margin-top:.3rem;">* 토지 구매 후 건물 건설 가능 · 건설 시 취득세 10% 추가</div>
    </div>
  `,[
    {l: canAfford ? '구매 (취득세 포함)' : '💸 잔액 부족', c: canAfford ? 'bsuc' : 'bs',
     f: canAfford ? async()=>{
      if(!state.realestate) state.realestate={plots:{},settings:reSettings(),listings:{}};
      if(!state.realestate.plots) state.realestate.plots={};
      const now=new Date().toISOString();
      state.realestate.plots[plotId]={owner:cu.name,building:null,boughtAt:now,boughtPrice:landPrice};
      st.bal=parseFloat((st.bal-total).toFixed(2));
      const upd={};
      upd[`realestate/plots/${plotId}`]={owner:cu.name,building:null,boughtAt:now,boughtPrice:landPrice};
      upd[`students/${cu.name}/bal`]=st.bal;
      addTxLog('withdraw',cu.name,total,cu.name,`${city.name} 토지 구매 (취득세 ${fE(tax)} 포함)`);
      await update(ref(db,ROOT),upd).catch(e=>console.error(e));
      closeModal(); showToast(`${city.emoji} ${city.name} 구매 완료! 매일 +${reCityIncome(plotId)}조개`);
      switchTab('realestate');
    } : closeModal},
    {l:'닫기',c:'bs',f:closeModal}
  ]);
}

// 슬라이더 전역 업데이트 핸들러
window.reUpdateSlider=function(val){
  const n=parseInt(val);
  const el=document.getElementById('reListAmt');
  const ni=document.getElementById('reListNumInput');
  if(el) el.textContent=(typeof fE==='function'?fE(n):n+'조개');
  if(ni) ni.value=n;
};
window.reUpdateNumInput=function(val){
  const n=parseInt(val)||0;
  const sl=document.getElementById('reListRange');
  const el=document.getElementById('reListAmt');
  if(!sl) return;
  const mn=parseInt(sl.min), mx=parseInt(sl.max);
  const clamped=Math.min(mx,Math.max(mn,n));
  sl.value=clamped;
  if(el) el.textContent=(typeof fE==='function'?fE(clamped):clamped+'조개');
};

function reSaveSettings(){

  // 도시 설정
  const newCities={};

    const income=parseFloat(document.getElementById(`re-c-income-${city.id}`)?.value);
    const desc=document.getElementById(`re-c-desc-${city.id}`)?.value.trim()||city.desc;
    if(!isNaN(price)&&price>0) newCities[city.id]={price, income:isNaN(income)?city.income:income, desc};
  });
  state.realestate.settings.cities=newCities;

  // 건물 공통 설정
  const newBuildings={};
  Object.keys(RE_BUILDINGS).forEach(bk=>{
    const bv=RE_BUILDINGS[bk];
    const cost=parseFloat(document.getElementById(`re-b-cost-${bk}`)?.value);
    const income=parseFloat(document.getElementById(`re-b-income-${bk}`)?.value);
    newBuildings[bk]={
      cost:  (!isNaN(cost)&&cost>0)?cost:bv.cost,
      income:(!isNaN(income)&&income>=0)?income:bv.income
    };
  });
  state.realestate.settings.buildings=newBuildings;

  // 도시별 건물 개별 설정
  const newCityBuildings={};
  RE_CITIES.forEach(city=>{
    const cb={};
    Object.keys(RE_BUILDINGS).forEach(bk=>{
      const cost=parseFloat(document.getElementById(`re-cb-cost-${city.id}-${bk}`)?.value);
      const income=parseFloat(document.getElementById(`re-cb-income-${city.id}-${bk}`)?.value);
      if(!isNaN(cost)&&cost>0) {
        cb[bk]={
          cost,
          income:(!isNaN(income)&&income>=0)?income:RE_BUILDINGS[bk].income
        };
      }
    });
    if(Object.keys(cb).length) newCityBuildings[city.id]=cb;
  });
  state.realestate.settings.cityBuildings=newCityBuildings;

  update(ref(db,ROOT+'/realestate/settings'),{
    cities:newCities,
    buildings:newBuildings,
    cityBuildings:Object.keys(newCityBuildings).length?newCityBuildings:null
  }).catch(()=>{});
  showToast('✅ 부동산 설정 저장 완료!');
  switchTab('realestate');
}

/* ===== v6.5 upgrade patch ===== */
function activeDepositTotal(st){
  return (st?.deps||[]).filter(d=>!d.done&&!d.er).reduce((a,d)=>a+(parseFloat(d.amt)||0),0);
}
function currentStockTotal(st){
  if(!st||!st.hld) return 0;
  return STOCKS.reduce((sum,s)=>sum+((st.hld[s.id]||0)*(state?.stocks?.[s.id]?.price||0)),0);
}
function currentInvestTotal(st){
  return parseFloat((((st?.bal||0)+currentStockTotal(st)+activeDepositTotal(st))).toFixed(2));
}
function ensureReturnFields(st){
  if(!st) return st;
  if(st.returnBaseTotal===undefined) st.returnBaseTotal=currentInvestTotal(st);
  if(st.returnCapitalFlow===undefined) st.returnCapitalFlow=0;
  if(st.returnExpenseExcluded===undefined) st.returnExpenseExcluded=0;
  if(st.returnBonusCashExcluded===undefined) st.returnBonusCashExcluded=0;
  if(!st.returnBonusLots) st.returnBonusLots={semi:0,food:0,ent:0};
  STOCKS.forEach(s=>{ if(st.returnBonusLots[s.id]===undefined) st.returnBonusLots[s.id]=0; });
  return st;
}
function bonusStockCurrentValue(st){
  ensureReturnFields(st);
  return STOCKS.reduce((sum,s)=>sum+((st.returnBonusLots?.[s.id]||0)*(state?.stocks?.[s.id]?.price||0)),0);
}
function effectiveReturnCapital(st){
  ensureReturnFields(st);
  return parseFloat(((st.returnBaseTotal||0)+(st.returnCapitalFlow||0)).toFixed(2));
}
function adjustedReturnTotal(st){
  ensureReturnFields(st);
  const total=currentInvestTotal(st);
  return parseFloat((total + (st.returnExpenseExcluded||0) - (st.returnBonusCashExcluded||0) - bonusStockCurrentValue(st)).toFixed(2));
}
async function migrateReturnSystemV60(force=false){
  if(!state||!state.students) return;
  if(!force && state.returnSystemVersion==='v60') return;
  const payload={};
  realStudents().forEach(s=>{
    const st=ensureStudentShape(state.students[s.name]);
    st.returnBaseTotal=currentInvestTotal(st);
    st.returnCapitalFlow=0;
    st.returnExpenseExcluded=0;
    st.returnBonusCashExcluded=0;
    st.returnBonusLots={semi:0,food:0,ent:0};
    payload[s.name]={
      returnBaseTotal:st.returnBaseTotal,
      returnCapitalFlow:0,
      returnExpenseExcluded:0,
      returnBonusCashExcluded:0,
      returnBonusLots:st.returnBonusLots
    };
  });
  state.returnSystemVersion='v60';
  state.rankResetDate=new Date().toISOString();
  try{
    await Promise.all([
      update(ref(db,ROOT+'/students'),payload),
      update(ref(db,ROOT),{returnSystemVersion:'v60',rankResetDate:state.rankResetDate})
    ]);
  }catch(e){
    console.warn('v6.0 return migration warning',e);
  }
}

function v60_calcP(name){
  if(!state.students) state.students={};
  if(!state.students[name]) state.students[name]={bal:0,hld:{semi:0,food:0,ent:0},deps:[],dep0:0,cb:{semi:0,food:0,ent:0}};
  const st=ensureReturnFields(state.students[name]);
  if(!st.hld) st.hld={semi:0,food:0,ent:0};
  if(!st.cb) st.cb={semi:0,food:0,ent:0};
  if(!st.deps) st.deps=[];
  if(!state.stocks) return {st,sv:0,total:st.bal||0,inv:0,tpnl:0,tpct:0,sd:[],dl:0};
  let sv=0;
  const sd=STOCKS.map(s=>{
    const q=st.hld[s.id]||0,cp=state.stocks[s.id].price,ac=st.cb[s.id]||0;
    const val=q*cp,cost=q*ac,pnl=val-cost,pct=cost>0?(pnl/cost*100):0;
    sv+=val;
    return {s,q,cp,ac,val,cost,pnl,pct,bonusQ:(st.returnBonusLots?.[s.id]||0)};
  });
  const dl=activeDepositTotal(st);
  // 부동산 자산 가치 (토지 구매가 기준)
  const rs=reSettings ? reSettings() : {};
  const landPrice=parseFloat(rs.landPrice)||400;
  const rePlots=state.realestate?.plots||{};
  let rl=0;
  Object.values(rePlots).forEach(p=>{ if(p&&p.owner===name) rl+=landPrice; });
  const total=parseFloat(((st.bal||0)+sv+dl+rl).toFixed(2));
  const inv=effectiveReturnCapital(st);
  const adjTotal=adjustedReturnTotal(st);
  const tpnl=parseFloat((adjTotal-inv).toFixed(2));
  const tpct=inv>0?tpnl/inv*100:0;
  return {st,sv,total,inv,tpnl,tpct,sd,dl,rl};
}

function newsTagFromItem(n){
  const chg=parseFloat(n?.chg||0);
  if(n?.isBreaking) return {label:'BREAKING',cls:'breaking'};
  if(Math.abs(chg)>=3) return {label:'MEGA',cls:'mega'};
  if(chg>0) return {label:'호재',cls:'pos'};
  if(chg<0) return {label:'악재',cls:'neg'};
  return {label:'중립',cls:'neu'};
}
function newsHint(n){
  const s=STOCKS.find(x=>x.id===n.sid);
  const chg=parseFloat(n?.chg||0);
  const dir=chg>0?'상승 압력':chg<0?'하락 압력':'방향 탐색';
  return `${s?s.name:''} · ${dir}`;
}
function marketPulseText(){
  const rows=STOCKS.map(s=>{
    const stk=state.stocks[s.id],hist=stk.history||[];
    const prev=hist.length>1?hist[hist.length-2]:stk.price;
    const pct=prev?((stk.price-prev)/prev*100):0;
    return {s,pct};
  });
  const pos=rows.filter(r=>r.pct>0).length;
  const neg=rows.filter(r=>r.pct<0).length;
  if(pos===3) return {label:'오늘은 전반적으로 강세',cls:'signal-good'};
  if(neg===3) return {label:'오늘은 전반적으로 약세',cls:'signal-bad'};
  if(pos===neg) return {label:'종목별로 엇갈린 흐름',cls:'signal-flat'};
  return pos>neg?{label:'상승 종목이 더 많아요',cls:'signal-good'}:{label:'하락 종목이 더 많아요',cls:'signal-bad'};
}

function v60_intradayChart(sid){
  const stk=state.stocks[sid];
  const intraday=stk.intraday||[];
  if(intraday.length<1) return '';
  const todayDateStr=kst().toDateString();
  const openPrice=stk.todayOpen?.[todayDateStr]||intraday[0].prev;
  const allTimes=['9:00','11:00','12:50','14:00'];
  const points=[{time:'시가',price:openPrice,isOpen:true},...intraday.map(d=>({time:d.time,price:d.price}))];
  const prices=points.map(p=>p.price);
  const mn=Math.min(...prices)*0.997, mx=Math.max(...prices)*1.003, rng=mx-mn||1;
  const W=360,H=130,PAD={t:20,r:52,b:28,l:10};
  const cw=W-PAD.l-PAD.r,ch=H-PAD.t-PAD.b;
  const allSlots=[{time:'시가',label:'시가'},...allTimes.map(t=>({time:t,label:t}))];
  const slotN=allSlots.length;
  const px=i=>PAD.l+(i/(slotN-1))*cw;
  // 슬롯별 가격 매핑
  const slotPrices=allSlots.map(slot=>{
    const pt=points.find(p=>p.time===slot.time);
    return pt?pt.price:null;
  });
  // 실제 있는 점만
  const realPts=slotPrices.map((v,i)=>v!=null?`${px(i)},${PAD.t+ch-((v-mn)/rng)*ch}`:null).filter(Boolean);
  const up=points[points.length-1].price>=openPrice;
  const stroke=up?'#16a34a':'#dc2626';
  const fillPts=`${PAD.l},${PAD.t+ch} ${realPts.join(' ')} ${realPts[realPts.length-1].split(',')[0]},${PAD.t+ch}`;
  const py=v=>PAD.t+ch-((v-mn)/rng)*ch;
  const pct=((points[points.length-1].price-openPrice)/openPrice*100);

  return `<div class="chart-wrap" style="margin-top:.6rem;">
    <div class="chart-label-row">
      <div class="chart-label">📊 오늘 흐름 (하루 4회 변동)</div>
      <div class="chart-legend" style="color:${up?'#16a34a':'#dc2626'};font-weight:700;">${up?'▲':'▼'} 시가 대비 ${pct>=0?'+':''}${pct.toFixed(2)}%</div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;">
      <defs>
        <linearGradient id="v60intra-${sid}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${stroke}" stop-opacity=".2"/>
          <stop offset="100%" stop-color="${stroke}" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- 시가 기준선 -->
      <line x1="${PAD.l}" y1="${py(openPrice)}" x2="${W-PAD.r}" y2="${py(openPrice)}"
        stroke="var(--g400)" stroke-width="1" stroke-dasharray="5,3"/>
      <text x="${W-PAD.r+4}" y="${py(openPrice)+3.5}" font-size="8" fill="var(--g500)">${fE2(openPrice)}</text>

      <!-- 면적 -->
      <polygon points="${fillPts}" fill="url(#v60intra-${sid})"/>

      <!-- 메인 라인 -->
      <polyline points="${realPts.join(' ')}" fill="none" stroke="${stroke}" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 각 슬롯 수직 구분선 + 레이블 -->
      ${allSlots.map((slot,i)=>{
        const v=slotPrices[i];
        const x=px(i);
        const hasData=v!=null;
        return `<line x1="${x}" y1="${PAD.t}" x2="${x}" y2="${PAD.t+ch}" stroke="var(--g100)" stroke-width="${hasData?1:.5}"/>
          <text x="${x}" y="${H-6}" text-anchor="middle" font-size="8.5" fill="${hasData?'var(--g600)':'var(--g300)'}" font-weight="${hasData?'600':'400'}">${slot.label}</text>
          ${hasData?`<circle cx="${x}" cy="${py(v)}" r="4" fill="${stroke}" stroke="white" stroke-width="1.5"/>
            <text x="${W-PAD.r+4}" y="${py(v)+3.5}" font-size="8.5" fill="${stroke}" font-weight="700">${fE2(v)}</text>`:''}`;
      }).join('')}

      <!-- 현재가 레이블 강조 -->
      <rect x="${W-PAD.r+3}" y="${py(points[points.length-1].price)-9}" width="47" height="14" rx="4" fill="${stroke}"/>
      <text x="${W-PAD.r+26}" y="${py(points[points.length-1].price)+1}" text-anchor="middle"
        font-size="9.5" fill="white" font-weight="700">${fE2(points[points.length-1].price)}</text>
    </svg>
  </div>`;
}
function v60_detailChart(sid){
  const stk=state.stocks[sid];
  const hist=stk.history||[];
  const dateHist=stk.dateHistory||[];
  if(hist.length<2) return '<div class="empty txs">데이터 부족 (최소 2일 필요)</div>';
  const todayDateStr=kst().toDateString();
  const todayConfirmed=state.lastMD===todayDateStr;
  const now=kst();
  const todayLabel=`${now.getMonth()+1}/${now.getDate()}`;
  let data=[...hist.slice(-30)];
  let dates=dateHist.length>=hist.length
    ? [...dateHist.slice(-30)]
    : data.map((_,i)=>{ const d=new Date(); d.setDate(d.getDate()-(data.length-1-i)); return`${d.getMonth()+1}/${d.getDate()}`; });
  if(!todayConfirmed && stk.price!==data[data.length-1]){
    data=[...data, stk.price];
    dates=[...dates, todayLabel+'*'];
  }
  const n=data.length;
  const W=360,H=180,PAD={t:22,r:52,b:34,l:10};
  const cw=W-PAD.l-PAD.r, ch=H-PAD.t-PAD.b;
  const mn=Math.min(...data)*0.995, mx=Math.max(...data)*1.005, rng=mx-mn||1;
  const px=i=>PAD.l+(i/(Math.max(n-1,1)))*cw;
  const py=v=>PAD.t+ch-((v-mn)/rng)*ch;
  const up=data[n-1]>=data[0];
  const stroke=up?'#16a34a':'#dc2626';

  // 이동평균 (5일)
  const ma5=data.map((v,i)=>{
    if(i<4) return null;
    return data.slice(i-4,i+1).reduce((a,b)=>a+b,0)/5;
  });

  const pts=data.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  const fillPts=`${px(0)},${PAD.t+ch} ${pts} ${px(n-1)},${PAD.t+ch}`;
  const ma5pts=ma5.map((v,i)=>v!=null?`${px(i)},${py(v)}`:null).filter(Boolean).join(' ');

  // Y축 레이블 (4개)
  const ySteps=[mn, mn+rng*0.33, mn+rng*0.67, mx];
  const step=Math.ceil(n/5);

  // 시작가 수평선
  const startPrice=data[0];

  return `<div class="chart-wrap">
    <div class="chart-label-row">
      <div class="chart-label">📈 ${n}일 차트</div>
      <div class="chart-legend" style="display:flex;gap:.5rem;align-items:center;">
        <span style="display:inline-block;width:12px;height:2px;background:${stroke};vertical-align:middle;"></span>
        <span>현재가</span>
        <span style="display:inline-block;width:12px;height:2px;background:#f59e0b;vertical-align:middle;border-top:2px dashed #f59e0b;"></span>
        <span>5일평균</span>
      </div>
    </div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;overflow:visible;">
      <defs>
        <linearGradient id="v60grad-${sid}" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="${stroke}" stop-opacity=".22"/>
          <stop offset="85%" stop-color="${stroke}" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- 그리드선 + Y축 레이블 -->
      ${ySteps.map(v=>`
        <line x1="${PAD.l}" y1="${py(v)}" x2="${W-PAD.r}" y2="${py(v)}" stroke="var(--g200)" stroke-width=".7" stroke-dasharray="3,4"/>
        <text x="${W-PAD.r+4}" y="${py(v)+3.5}" font-size="8.5" fill="var(--g500)">${fE2(v)}</text>
      `).join('')}

      <!-- 시작가 기준선 -->
      <line x1="${PAD.l}" y1="${py(startPrice)}" x2="${W-PAD.r}" y2="${py(startPrice)}"
        stroke="var(--g400)" stroke-width="1" stroke-dasharray="6,3"/>

      <!-- 면적 그라디언트 -->
      <polygon points="${fillPts}" fill="url(#v60grad-${sid})"/>

      <!-- 메인 라인 -->
      <polyline points="${pts}" fill="none" stroke="${stroke}" stroke-width="2.8"
        stroke-linecap="round" stroke-linejoin="round"/>

      <!-- 5일 이동평균선 -->
      ${ma5pts?`<polyline points="${ma5pts}" fill="none" stroke="#f59e0b" stroke-width="1.6"
        stroke-dasharray="4,3" stroke-linecap="round" opacity=".85"/>`:''}

      <!-- 데이터 포인트 (처음·끝·최고·최저) -->
      ${data.map((v,i)=>{
        const isFirst=i===0, isLast=i===n-1;
        const isHigh=v===Math.max(...data), isLow=v===Math.min(...data);
        if(!isFirst&&!isLast&&!isHigh&&!isLow) return '';
        const r=isLast?5:3.5;
        const fill=isLast?stroke:(isHigh?'#16a34a':isLow?'#dc2626':'var(--g400)');
        return `<circle cx="${px(i)}" cy="${py(v)}" r="${r}" fill="${fill}" stroke="white" stroke-width="1.5"/>`;
      }).join('')}

      <!-- 현재가 강조 레이블 -->
      <rect x="${W-PAD.r+3}" y="${py(data[n-1])-9}" width="47" height="14" rx="4"
        fill="${stroke}"/>
      <text x="${W-PAD.r+26}" y="${py(data[n-1])+1}" text-anchor="middle" font-size="9.5"
        fill="white" font-weight="700">${fE2(data[n-1])}</text>

      <!-- 최고/최저 레이블 -->
      ${(()=>{
        const hiIdx=data.indexOf(Math.max(...data));
        const loIdx=data.indexOf(Math.min(...data));
        const hiY=py(data[hiIdx]);
        const loY=py(data[loIdx]);
        return `
          <text x="${px(hiIdx)}" y="${hiY-7}" text-anchor="middle" font-size="8" fill="#16a34a" font-weight="600">▲${fE2(data[hiIdx])}</text>
          <text x="${px(loIdx)}" y="${loY+14}" text-anchor="middle" font-size="8" fill="#dc2626" font-weight="600">▼${fE2(data[loIdx])}</text>
        `;
      })()}

      <!-- X축 날짜 레이블 -->
      ${data.map((v,i)=>i%step===0||i===n-1?`<text x="${px(i)}" y="${H-8}" text-anchor="${i===n-1?'end':i===0?'start':'middle'}"
        font-size="8.5" fill="${i===n-1?stroke:'var(--g500)'}" font-weight="${i===n-1?'700':'400'}">${(dates[i]||'').replace('*','')}</text>`:'').join('')}
    </svg>
  </div>`;
}

async function v60_processDonate(amt){
  const rounded=Math.floor(amt);
  if(rounded<=0){showToast('금액을 다시 확인해주세요.');return;}
  const stuRef=ref(db,ROOT+'/students/'+cu.name);
  const totalRef=ref(db,ROOT+'/totalDonation');
  // 학생 잔액 트랜잭션 — 동시 기부 충돌 방지
  let newBal=0;
  try{
    const txResult=await runTransaction(stuRef,(cur)=>{
      if(!cur) return cur;
      const bal=parseFloat(cur.bal||0);
      if(bal<rounded) return; // abort — 잔액 부족
      cur.bal=parseFloat((bal-rounded).toFixed(2));
      cur.iconSpent=parseFloat(((cur.iconSpent||0)+rounded).toFixed(2));
      cur.returnExpenseExcluded=parseFloat(((cur.returnExpenseExcluded||0)+rounded).toFixed(2));
      return cur;
    });
    if(!txResult.committed){
      showToast('잔액이 부족합니다.');return;
    }
    newBal=txResult.snapshot.val()?.bal??0;
    // 로컬 state 동기화
    const st=state.students[cu.name];
    if(st){
      st.bal=newBal;
      st.iconSpent=(st.iconSpent||0)+rounded;
      st.returnExpenseExcluded=(st.returnExpenseExcluded||0)+rounded;
    }
  }catch(e){
    showToast('기부 처리 중 오류가 발생했습니다.');
    console.error('[donate] student tx error:',e);return;
  }
  // totalDonation 트랜잭션 — 누락 방지
  try{
    await runTransaction(totalRef,(cur)=>{
      return parseFloat(((cur||0)+rounded).toFixed(2));
    });
  }catch(e){
    console.error('[donate] totalDonation tx error:',e);
  }
  // donationLog 항목 추가
  const entry={name:cu.name,amount:rounded,date:dStr(),ts:new Date().toISOString()};
  const key=entry.ts.replace(/[^0-9a-zA-Z_]/g,'_');
  update(ref(db,ROOT+'/donationLog/'+key), entry).catch(()=>{});
  // 로컬 state
  state.totalDonation=parseFloat(((state.totalDonation||0)+rounded).toFixed(2));
  if(!state.donationLog) state.donationLog=[];
  state.donationLog.unshift(entry);
  _donLogLoaded=true;
  addTxLog('withdraw',cu.name,rounded,cu.name,`💚 반 나무 기부`);
  playSound('buy');
  showToast(`💚 ${fE(rounded)} 기부 완료! 고마워요!`);
  const donEl=document.getElementById('tab-donation');
  if(donEl&&donEl.classList.contains('active')) rDonation(donEl);
  else switchTab('donation');
  setTimeout(()=>{
    const tree=document.getElementById('donationTree');
    if(tree){ tree.classList.remove('tree-shake'); void tree.offsetWidth; tree.classList.add('tree-shake'); }
  },150);
}
async function v60_doExTrade(sid,action,qty){
  qty=Math.floor(Number(qty));
  if(!Number.isInteger(qty)||qty<=0){showToast('수량을 다시 확인해주세요.');return;}
  if(!beginTradeLock()){showToast('잠시만요. 이전 거래를 처리 중입니다.');return;}
  const stk=state.stocks[sid];
  const sn=STOCKS.find(s=>s.id===sid).name;
  const studentRef=ref(db,ROOT+'/students/'+cu.name);
  let resultMsg='', sound='', tx=null;
  try{
    const txResult=await runTransaction(studentRef,(current)=>{
      const st=ensureReturnFields(ensureStudentShape(current));
      if(action==='buy'){
        const cost=parseFloat((qty*stk.price).toFixed(2));
        if(cost>st.bal) return;
        updateCB({students:{[cu.name]:st}},cu.name,sid,qty,stk.price,true);
        st.bal=parseFloat((st.bal-cost).toFixed(2));
        st.hld[sid]=(st.hld[sid]||0)+qty;
        tx={type:'deposit',amt:cost,note:`${sn} ${qty}주 매수 @${fE2(stk.price)}`};
        resultMsg=`${sn} ${qty}주 매수 완료! 🎉`; sound='buy';
        return st;
      }
      const held=st.hld[sid]||0;
      if(qty>held) return;
      const fee=parseFloat((qty*(state.sellFee||1)).toFixed(2));
      const proc=parseFloat((qty*stk.price-fee).toFixed(2));
      if(proc<0) return;
      const bonusHeld=st.returnBonusLots?.[sid]||0;
      const bonusSold=Math.min(qty,bonusHeld);
      if(bonusSold>0){
        const bonusNet=parseFloat((bonusSold*stk.price - fee*(bonusSold/qty)).toFixed(2));
        st.returnBonusLots[sid]=Math.max(0,bonusHeld-bonusSold);
        st.returnBonusCashExcluded=parseFloat(((st.returnBonusCashExcluded||0)+bonusNet).toFixed(2));
      }
      updateCB({students:{[cu.name]:st}},cu.name,sid,qty,stk.price,false);
      st.bal=parseFloat((st.bal+proc).toFixed(2));
      st.hld[sid]=Math.max(0,(st.hld[sid]||0)-qty);
      tx={type:'withdraw',amt:proc,note:`${sn} ${qty}주 매도 @${fE2(stk.price)} (수수료 ${fE2(fee)})`};
      resultMsg=`${sn} ${qty}주 매도 완료! (+${fE2(proc)})`; sound='sell';
      return st;
    });
    if(!txResult.committed){
      clearTradeLock();
      showToast(action==='buy'?'잔액 변동으로 매수 실패':'보유 수량 변동으로 매도 실패');
      return;
    }
    state.students[cu.name]=ensureReturnFields(ensureStudentShape(txResult.snapshot.val()));
    if(tx) addTxLog(tx.type,cu.name,tx.amt,cu.name,tx.note);
    showToast(resultMsg);
    if(sound) playSound(sound);
  }catch(err){
    console.error('Trade error',err);
    clearTradeLock(); showToast('거래 처리 중 오류가 발생했습니다.'); return;
  }
  clearTradeLock(); investSubTab='trade'; switchTab('invest');
}
async function v60_appC(id){
  const req=state.pd.find(r=>r.id===id); if(!req) return;
  const studentRef=ref(db,ROOT+'/students/'+req.to);
  const amt=parseFloat(req.amt.toFixed?req.amt.toFixed(2):req.amt);
  try{
    const txResult=await runTransaction(studentRef,(current)=>{
      const st=ensureReturnFields(ensureStudentShape(current));
      if(req.type==='deposit'){
        st.bal=parseFloat(((st.bal||0)+amt).toFixed(2));
        st.dep0=parseFloat((((st.dep0||0)+amt)).toFixed(2));
        st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)+amt)).toFixed(2));
        return st;
      }
      if((st.bal||0)<amt) return;
      st.bal=parseFloat(((st.bal||0)-amt).toFixed(2));
      st.dep0=parseFloat((Math.max(0,(st.dep0||0)-amt)).toFixed(2));
      st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)-amt)).toFixed(2));
      return st;
    });
    if(!txResult.committed){showToast('투자 가능 금액 부족');return;}
    state.students[req.to]=ensureReturnFields(ensureStudentShape(txResult.snapshot.val()));
    addTxLog(req.type==='deposit'?'deposit':'withdraw',req.to,amt,cu.name,'요청 승인');
    req.st='approved'; set(ref(db,ROOT+'/pd'),state.pd).catch(()=>{});
    showToast(`${req.to} ${req.type==='deposit'?'입금':'출금'} 승인!`);
    rCashier(document.getElementById('tab-cashier'));
  }catch(e){
    console.error('Approve cashier request error',e); showToast('승인 처리 중 오류가 발생했습니다.');
  }
}

      const st=ensureReturnFields(ensureStudentShape(current));
      if(type==='deposit'){
        st.bal=parseFloat(((st.bal||0)+amt).toFixed(2));
        st.dep0=parseFloat((((st.dep0||0)+amt)).toFixed(2));
        st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)+amt)).toFixed(2));
        return st;
      }
      if((st.bal||0)<amt) return;
      st.bal=parseFloat(((st.bal||0)-amt).toFixed(2));
      st.dep0=parseFloat((Math.max(0,(st.dep0||0)-amt)).toFixed(2));
      st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)-amt)).toFixed(2));
      return st;
    });
    if(!txResult.committed){showToast('잔액이 부족합니다.');return;}
    state.students[name]=ensureReturnFields(ensureStudentShape(txResult.snapshot.val()));
    addTxLog(type==='deposit'?'deposit':'withdraw',name,amt,cu.name,type==='deposit'?'직접 입금':'직접 출금');
    showToast(type==='deposit'?`${name}에게 ${fE(amt)} 입금 완료!`:`${name}에서 ${fE(amt)} 출금 완료!`);
    setTimeout(()=>{ document.getElementById('csAmt')?.focus(); },50);
  }catch(e){
    console.error('Direct cashier transaction error',e); showToast('처리 중 오류가 발생했습니다.');
  }
}
function v60_bulkDeposit(){

    {l:'입금',c:'bsuc',f:async()=>{
      const updates={}; let cnt=0;
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        const st=state.students[s.name]; if(!st||(st.dep0||0)===0) return;

        const newBal=parseFloat(((st.bal||0)+amt).toFixed(2));

        st.bal=newBal; st.dep0=newDep0; st.returnCapitalFlow=newFlow;

        cnt++;

function v60_bulkWithdraw(){
  const amt=parseFloat(document.getElementById('bulkAmt').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요.');return;}
  const withdrawAmt=Math.round(amt);
  openModal('일괄 회수 확인',`<p class="tsm">투자 기록이 있는 학생 전원에게서 1인당 <strong>${fE(withdrawAmt)}</strong>를 회수합니다. 잔액 부족한 학생은 제외됩니다.</p>`,[
    {l:'회수',c:'bdan',f:async()=>{
      const updates={}; let cnt=0,skip=0;
      STUDENTS.concat(state.extraStudents||[]).forEach(s=>{
        const st=state.students[s.name]; if(!st||(st.dep0||0)===0) return;
        if((st.bal||0)<withdrawAmt){skip++;return;}
        ensureReturnFields(st);
        const newBal=parseFloat(((st.bal||0)-withdrawAmt).toFixed(2));
        const newDep0=parseFloat((Math.max(0,(st.dep0||0)-withdrawAmt)).toFixed(2));
        const newFlow=parseFloat((((st.returnCapitalFlow||0)-withdrawAmt)).toFixed(2));
        st.bal=newBal; st.dep0=newDep0; st.returnCapitalFlow=newFlow;
        updates[`students/${s.name}/bal`]=newBal;
        updates[`students/${s.name}/dep0`]=newDep0;
        updates[`students/${s.name}/returnCapitalFlow`]=newFlow;
        addTxLog('withdraw',s.name,withdrawAmt,cu.name,'일괄 회수');
        cnt++;
      });
      if(cnt===0){showToast(skip>0?'회수 가능한 학생이 없습니다.':'처리할 학생이 없습니다.');closeModal();return;}
      update(ref(db,ROOT),updates).catch(()=>{});
      showToast(`${cnt}명 회수 완료${skip>0?` (잔액부족 ${skip}명 제외)`:''}`); closeModal();
      rTeacher(document.getElementById('tab-teacher'));
    }},{l:'취소',c:'bs',f:closeModal}
  ]);
}
function v60_applyAdjust(){
  const name=document.getElementById('adjStudent')?.value;
  const balAdj=parseFloat(document.getElementById('adjBal')?.value)||0;
  const sid=document.getElementById('adjStock')?.value;
  const qtyAdj=parseInt(document.getElementById('adjQty')?.value)||0;
  if(!name){showToast('학생을 선택해주세요.');return;}
  if(balAdj===0&&qtyAdj===0){showToast('조정할 값을 입력해주세요.');return;}
  const st=ensureReturnFields(state.students[name]);
  if(!st){showToast('학생 데이터가 없습니다.');return;}
  const changes=[]; const upd={};
  if(balAdj!==0){
    st.bal=parseFloat((st.bal+balAdj).toFixed(2));
    st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)+balAdj)).toFixed(2));
    upd.bal=st.bal; upd.returnCapitalFlow=st.returnCapitalFlow;
    addTxLog(balAdj>0?'deposit':'withdraw',name,Math.abs(balAdj),cu.name,'교사 수동 조정');
    changes.push(`잔액 ${balAdj>0?'+':''}${fE2(balAdj)}`);
  }
  if(qtyAdj!==0&&sid){
    if(!st.hld) st.hld={semi:0,food:0,ent:0};
    if(!st.cb) st.cb={semi:0,food:0,ent:0};
    const oldQty=st.hld[sid]||0;
    const newQty=Math.max(0,oldQty+qtyAdj);
    const curPrice=state.stocks[sid].price;
    if(qtyAdj>0&&newQty>0){
      const oldCost=oldQty*(st.cb[sid]||0), addCost=qtyAdj*curPrice;
      st.cb[sid]=parseFloat(((oldCost+addCost)/newQty).toFixed(2));
      st.returnBonusLots[sid]=(st.returnBonusLots[sid]||0)+qtyAdj;
    }else if(qtyAdj<0){
      const removeQty=Math.abs(qtyAdj);
      const bonusQ=st.returnBonusLots[sid]||0;
      const usedBonus=Math.min(removeQty, bonusQ);
      st.returnBonusLots[sid]=Math.max(0, bonusQ-usedBonus);
      const regularRemoved=removeQty-usedBonus;
      if(regularRemoved>0){
        st.returnCapitalFlow=parseFloat((((st.returnCapitalFlow||0)-(regularRemoved*curPrice))).toFixed(2));
        upd.returnCapitalFlow=st.returnCapitalFlow;
      }
    }
    if(newQty===0) st.cb[sid]=0;
    st.hld[sid]=newQty;
    upd[`hld/${sid}`]=newQty; upd[`cb/${sid}`]=st.cb[sid]; upd[`returnBonusLots/${sid}`]=st.returnBonusLots[sid]||0;
    const sn=STOCKS.find(s=>s.id===sid)?.name||sid; changes.push(`${sn} ${qtyAdj>0?'+':''}${qtyAdj}주`);
  }
  update(ref(db,ROOT+'/students/'+name),upd).catch(()=>{});
  showToast(`${name}: ${changes.join(', ')} 조정 완료!`);
  closeModal();
}
